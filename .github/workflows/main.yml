name: 🚀 PlayNexus CI/CD

# ─────────────────────────────────────────────────────────────────
#  Trigger on every push to develop, main, or feature branches.
#  (Only one run triggered per push — no double-triggering)
# ─────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main, develop, 'feature/**' ]
  workflow_dispatch:         # Allow manual run from GitHub UI

# Fix for Node.js 20 deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Cancel stale runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Always Validate (runs on every branch)
  # ─────────────────────────────────────────────────────────────
  validate:
    name: ✅ Validate Files
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: 🔍 Check required files exist
        run: |
          echo "── Checking project files in src/ ──"
          test -f src/index.html    || (echo "❌ src/index.html missing!"   && exit 1)
          test -f src/css/style.css || (echo "❌ src/css/style.css missing!" && exit 1)
          test -f src/js/main.js    || (echo "❌ src/js/main.js missing!"    && exit 1)
          echo "✅ All required source files are present"

      - name: 🧹 Cleanup workspace
        if: always()
        run: rm -rf ${{ github.workspace }}/* || true

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Deploy to Production (ONLY on main branch)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Production Deploy
    needs: validate          # MUST pass validation first
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    # Environment link in GitHub UI
    env:
      SITE_URL: ${{ secrets.SITE_URL }}
    environment:
      name: production
      url: ${{ env.SITE_URL }}

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: 🛡️ Mask Sensitive Data
        run: |
          echo "::add-mask::${{ secrets.SITE_URL }}"
          echo "::add-mask::${{ secrets.FTP_USERNAME }}"
          echo "::add-mask::${{ secrets.FTP_SERVER }}"

      - name: 📂 FTP Deploy to Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME }}
          password:   ${{ secrets.FTP_PASSWORD }}
          local-dir:  ./src/       # Deploy ONLY the source folder
          server-dir: ${{ vars.FTP_SERVER_DIR || '/htdocs/' }}
          protocol:   ftp
          port:       21
          exclude: |
            **/.git/**
            **/.github/**

      - name: 🧹 Cleanup workspace
        if: always()
        run: rm -rf ${{ github.workspace }}/* || true

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Visual Smoke Test (Verification)
  # ─────────────────────────────────────────────────────────────
  smoke-test:
    name: 🔍 Visual Smoke Test
    needs: deploy            # Runs only after successful deploy
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    env:
      SITE_URL: ${{ secrets.SITE_URL }}

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

  #  Installing Playwright takes a moment, but it's the only 
  #  reliable way to bypass bot-firewalls in production.
      - name: 🎭 Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: 📸 Run Smoke Test
        run: node tests/smoke.test.js

      - name: 📦 Upload Live Screenshot
        if: always()         # Always upload if test started
        uses: actions/upload-artifact@v4
        with:
          name: live-site-screenshot
          path: screenshot.png
          retention-days: 3  # Auto-delete after 3 days

      - name: 🧹 Cleanup workspace
        if: always()         # Always run to ensure runner is clean
        run: rm -rf ${{ github.workspace }}/* || true
