name: 🚀 PlayNexus CI/CD

# ─────────────────────────────────────────────────────────────────
#  Trigger on every push to develop, main, or feature branches.
#  (Only one run triggered per push — no double-triggering)
# ─────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main, develop, 'feature/**' ]
  workflow_dispatch:         # Allow manual run from GitHub UI

# Fix for Node.js 20 deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Cancel stale runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Always Validate (runs on every branch)
  # ─────────────────────────────────────────────────────────────
  validate:
    name: ✅ Validate Files
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: 🔍 Check required files exist
        run: |
          echo "── Checking project files in src/ ──"
          test -f src/index.html    || (echo "❌ src/index.html missing!"   && exit 1)
          test -f src/css/style.css || (echo "❌ src/css/style.css missing!" && exit 1)
          test -f src/js/main.js    || (echo "❌ src/js/main.js missing!"    && exit 1)
          echo "✅ All required source files are present"

      - name: 🧹 Cleanup workspace
        if: always()
        run: rm -rf ${{ github.workspace }}/* || true

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Deploy to Production (ONLY on main branch)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Production Deploy
    needs: validate          # MUST pass validation first
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://playnexus.unaux.com

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: 📂 FTP Deploy to /htdocs/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME }}
          password:   ${{ secrets.FTP_PASSWORD }}
          local-dir:  ./src/       # Deploy ONLY the source folder
          server-dir: /htdocs/
          protocol:   ftp
          port:       21
          # Only exclude git/github folders if they exist inside src/
          exclude: |
            **/.git/**
            **/.github/**

      - name: 🧹 Cleanup workspace
        if: always()
        run: rm -rf ${{ github.workspace }}/* || true
