name: Deploy to Render

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    concurrency:
      group: quality-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install flake8 mypy black bandit anthropic openai

      - name: Python syntax check
        run: python -m py_compile src/backend/main.py

      - name: Lint with flake8 (critical errors)
        run: |
          flake8 src/backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          echo "flake8_critical_count=$?" >> $GITHUB_OUTPUT

      - name: Type check with mypy
        run: |
          mypy src/backend/main.py --ignore-missing-imports

      - name: Format check with black
        run: |
          black --check src/backend/

      - name: Security scan with bandit
        run: |
          bandit -r src/backend/ -f json -o bandit-report.json || true
          echo "bandit_report=$PWD/bandit-report.json" >> $GITHUB_OUTPUT

      - name: Claude Security Analysis (OpenRouter Free Tier)
        if: secrets.OPENROUTER_API_KEY != ''
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL || 'meta-llama/llama-3.3-70b-instruct' }}
        run: |
          echo "Running AI-powered security analysis via OpenRouter..."
          python .github/scripts/claude_security_scan.py
          if [ -f "claude-security-report.json" ]; then
            echo "claude_report=$PWD/claude-security-report.json" >> $GITHUB_OUTPUT
            echo "report_generated=true" >> $GITHUB_OUTPUT
          else
            echo "report_generated=false" >> $GITHUB_OUTPUT
          fi
        id: claude-analysis

      - name: Upload security reports
        if: always()
        run: |
          mkdir -p reports
          if [ -f "bandit-report.json" ]; then cp bandit-report.json reports/; fi
          if [ -f "claude-security-report.json" ]; then cp claude-security-report.json reports/; fi

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: reports/
          retention-days: 7

      - name: Check for blocking issues
        if: always()
        run: |
          python - <<'PY'
          import json, sys
          fail = 0

          # Check bandit for high/critical
          try:
              with open('bandit-report.json') as f:
                  bandit = json.load(f)
              high_critical = [i for i in bandit if i.get('issue_severity') in ('High', 'Critical')]
              if len(high_critical) > 0:
                  print(f"❌ Found {len(high_critical)} High/Critical issues in bandit scan")
                  fail = 1
          except FileNotFoundError:
              pass
          except Exception as e:
              print(f"⚠️  Error reading bandit report: {e}")

          # Check Claude for critical/high (only if report was generated)
          import os
          report_generated = os.getenv('CLAUDE_REPORT_GENERATED', 'false') == 'true'
          if report_generated:
              try:
                  with open('claude-security-report.json') as f:
                      claude = json.load(f)
                  by_sev = claude.get('summary', {}).get('by_severity', {})
                  critical = by_sev.get('Critical', 0)
                  high = by_sev.get('High', 0)
                  if critical > 0 or high > 0:
                      print(f"❌ Claude found {critical} Critical and {high} High severity issues")
                      fail = 1
              except FileNotFoundError:
                  print("⚠️  Claude report not found though marked as generated")
                  fail = 1
              except Exception as e:
                  print(f"⚠️  Error reading Claude report: {e}")
                  fail = 1

          if fail:
              print("❌ Quality checks failed. See reports for details.")
              sys.exit(1)
          else:
              print("✅ Quality checks passed")
          PY
        env:
          CLAUDE_REPORT_GENERATED: ${{ steps.claude-analysis.outputs.report_generated }}

  precheck:
    needs: quality
    runs-on: ubuntu-latest
    concurrency:
      group: precheck-${{ github.ref }}
      cancel-in-progress: true
    outputs:
      environment: ${{ steps.check.outputs.environment }}
    steps:
      - name: Determine environment and validate secrets
        id: check
        run: |
          # Determine environment
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENV="production"
            SERVICE_ID_SECRET="RENDER_SERVICE_ID_PROD"
          else
            ENV="staging"
            SERVICE_ID_SECRET="RENDER_SERVICE_ID_TEST"
          fi

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "service_id_secret=$SERVICE_ID_SECRET" >> $GITHUB_OUTPUT

          echo "✅ Environment: $ENV"
          echo "   Service ID secret: $SERVICE_ID_SECRET"

      - name: Validate mandatory secrets
        run: |
          echo "🔍 Validating mandatory secrets..."

          # Check PostgreSQL secrets
          local missing=()
          if [ -z "${{ secrets.PGHOST }}" ]; then missing+=("PGHOST"); fi
          if [ -z "${{ secrets.PGPORT }}" ]; then missing+=("PGPORT"); fi
          if [ -z "${{ secrets.PGUSER }}" ]; then missing+=("PGUSER"); fi
          if [ -z "${{ secrets.PGPASSWORD }}" ]; then missing+=("PGPASSWORD"); fi
          if [ -z "${{ secrets.PGDATABASE }}" ]; then missing+=("PGDATABASE"); fi

          # Check Render secrets
          if [ -z "${{ secrets.RENDER_API_KEY }}" ]; then missing+=("RENDER_API_KEY"); fi

          # Check service ID based on environment from previous step
          ENV="${{ steps.check.outputs.environment }}"
          if [ "$ENV" = "production" ]; then
            if [ -z "${{ secrets.RENDER_SERVICE_ID_PROD }}" ]; then missing+=("RENDER_SERVICE_ID_PROD"); fi
          else
            if [ -z "${{ secrets.RENDER_SERVICE_ID_TEST }}" ]; then missing+=("RENDER_SERVICE_ID_TEST"); fi
          fi

          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Missing required secrets: ${missing[*]}"
            echo ""
            echo "Please add these secrets in GitHub:"
            echo "  Settings → Secrets and variables → Actions → New repository secret"
            echo ""
            echo "Required (PostgreSQL):"
            echo "  - PGHOST"
            echo "  - PGPORT (usually 5432)"
            echo "  - PGUSER"
            echo "  - PGPASSWORD"
            echo "  - PGDATABASE"
            echo ""
            echo "Required (Render):"
            echo "  - RENDER_API_KEY"
            echo "  - RENDER_SERVICE_ID_TEST (for staging)"
            echo "  - RENDER_SERVICE_ID_PROD (for production)"
            exit 1
          fi

          echo "✅ All required secrets present"

  migrate-database:
    needs: precheck
    concurrency:
      group: migrate-${{ needs.precheck.outputs.environment }}
      cancel-in-progress: true
    uses: ./.github/workflows/flyway-migrate.yml
    with:
      environment: ${{ needs.precheck.outputs.environment }}
    secrets:
      PGHOST: ${{ secrets.PGHOST }}
      PGPORT: ${{ secrets.PGPORT }}
      PGUSER: ${{ secrets.PGUSER }}
      PGPASSWORD: ${{ secrets.PGPASSWORD }}
      PGDATABASE: ${{ secrets.PGDATABASE }}

  deploy:
    needs: migrate-database
    if: needs.migrate-database.outputs.success == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ needs.precheck.outputs.environment }}
      cancel-in-progress: true
    environment: ${{ needs.precheck.outputs.environment }}
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ needs.precheck.outputs.environment == 'production' && secrets.RENDER_SERVICE_ID_PROD || secrets.RENDER_SERVICE_ID_TEST }}
      DISPLAY_ENV: ${{ needs.precheck.outputs.environment == 'production' && 'Production' || 'Staging' }}
      APP_ENV: ${{ needs.precheck.outputs.environment == 'production' && 'production' || 'test' }}
      ENV: ${{ needs.precheck.outputs.environment == 'production' && 'prod' || 'test' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        if: success()
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Validate Render configuration
        if: success()
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "ERROR: RENDER_API_KEY is not set"
            exit 1
          fi
          if [ -z "$RENDER_SERVICE_ID" ]; then
            echo "ERROR: RENDER_SERVICE_ID is not set"
            exit 1
          fi
          echo "✅ Render configuration validated"
          echo "   Environment: $DISPLAY_ENV"
          echo "   Service ID: $RENDER_SERVICE_ID"

      - name: Trigger Render deployment
        id: trigger
        if: success()
        env:
          RENDER_API_KEY: ${{ env.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ env.RENDER_SERVICE_ID }}
        run: |
          set -e

          echo "🚀 Triggering deployment for $DISPLAY_ENV..."

          max_wait=30
          for i in $(seq 1 $max_wait); do
            deploy_status=$(curl -s \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" | jq -r '.[0].status // "empty"')

            if [[ "$deploy_status" =~ ^(live|succeeded|errored|failed|canceled)$ ]] || [ "$deploy_status" = "empty" ]; then
              break
            fi
            echo "Waiting for in-progress deployment to complete... ($i/$max_wait)"
            sleep 30
          done

          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          if [[ ! "$http_code" =~ ^(200|201|202)$ ]]; then
            echo "❌ Deploy trigger failed (HTTP $http_code):"
            echo "$body" | jq . 2>/dev/null || echo "$body"
            exit 1
          fi

          deploy_id=$(echo "$body" | jq -r '.id')
          echo "deploy_id=$deploy_id" >> $GITHUB_OUTPUT
          echo "Deployment triggered: $deploy_id"

      - name: Monitor deployment
        id: monitor
        if: success()
        env:
          RENDER_API_KEY: ${{ env.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ env.RENDER_SERVICE_ID }}
        run: |
          deploy_id="${{ steps.trigger.outputs.deploy_id }}"
          echo "Monitoring deployment: $deploy_id"

          for i in $(seq 1 60); do
            status=$(curl -s \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$deploy_id" | jq -r '.status')

            echo "[$i/60] Status: $status"

            if [[ "$status" == "live" ]] || [[ "$status" == "succeeded" ]]; then
              echo "✅ Deployment successful!"
              exit 0
            elif [[ "$status" =~ ^(errored|failed|canceled|build_failed|update_failed)$ ]]; then
              echo "❌ Deployment failed with status: $status"
              curl -s \
                -H "Authorization: Bearer $RENDER_API_KEY" \
                "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$deploy_id" | jq .
              exit 1
            fi
            sleep 30
          done

          echo "TIMEOUT: Deployment did not complete within 30 minutes"
          exit 1

      - name: Get service URL
        id: get-url
        if: success()
        env:
          RENDER_API_KEY: ${{ env.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ env.RENDER_SERVICE_ID }}
        run: |
          service_url=$(curl -s \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID" | jq -r '.service.url')
          echo "service_url=$service_url" >> $GITHUB_OUTPUT

      - name: Health check
        if: success()
        env:
          RENDER_API_KEY: ${{ env.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ env.RENDER_SERVICE_ID }}
        run: |
          service_url="${{ steps.get-url.outputs.service_url }}"
          if [ -z "$service_url" ] || [ "$service_url" = "null" ]; then
            echo "Service URL not available, skipping health check"
            exit 0
          fi

          base_url="https://$service_url"
          echo "Service URL: $base_url"

          endpoints=("/health" "/api/auth/login")
          for endpoint in "${endpoints[@]}"; do
            echo "Checking $base_url$endpoint..."
            code=$(curl -s -o /dev/null -w "%{http_code}" "$base_url$endpoint")
            if [[ "$code" =~ ^(200|302|401)$ ]]; then
              echo "  ✅ OK ($code)"
            else
              echo "  ❌ FAILED ($code)"
              exit 1
            fi
          done

          echo "All health checks passed!"

      - name: Smoke test
        if: success()
        env:
          SITE_URL: ${{ steps.get-url.outputs.service_url }}
        run: |
          if [ -z "$SITE_URL" ] || [ "$SITE_URL" = "null" ]; then
            SITE_URL="https://$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" "https://api.render.com/v1/services/$RENDER_SERVICE_ID" | jq -r '.service.url')"
          fi
          echo "Running smoke test on: $SITE_URL"
          SITE_URL="$SITE_URL" node tests/smoke.test.js
