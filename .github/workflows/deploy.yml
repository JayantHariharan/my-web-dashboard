name: Deploy to Render

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
  cancel-in-progress: true

jobs:
  precheck:
    runs-on: ubuntu-latest
    concurrency:
      group: precheck-${{ github.ref }}
      cancel-in-progress: true
    outputs:
      environment: ${{ steps.check.outputs.environment }}
    steps:
      - name: Determine environment and validate secrets
        id: check
        env:
          PGHOST: ${{ secrets.PGHOST }}
          PGPORT: ${{ secrets.PGPORT }}
          PGUSER: ${{ secrets.PGUSER }}
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
          PGDATABASE: ${{ secrets.PGDATABASE }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID_PROD: ${{ secrets.RENDER_SERVICE_ID_PROD }}
          RENDER_SERVICE_ID_TEST: ${{ secrets.RENDER_SERVICE_ID_TEST }}
        run: |
          # Determine environment
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENV="production"
            SERVICE_ID_SECRET="RENDER_SERVICE_ID_PROD"
          else
            ENV="staging"
            SERVICE_ID_SECRET="RENDER_SERVICE_ID_TEST"
          fi

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "service_id_secret=$SERVICE_ID_SECRET" >> $GITHUB_OUTPUT

          echo "✅ Environment: $ENV"
          echo "   Service ID secret: $SERVICE_ID_SECRET"

          # Check PostgreSQL secrets
          missing=()
          if [ -z "$PGHOST" ]; then missing+=("PGHOST"); fi
          if [ -z "$PGPORT" ]; then missing+=("PGPORT"); fi
          if [ -z "$PGUSER" ]; then missing+=("PGUSER"); fi
          if [ -z "$PGPASSWORD" ]; then missing+=("PGPASSWORD"); fi
          if [ -z "$PGDATABASE" ]; then missing+=("PGDATABASE"); fi

          # Check Render secrets
          if [ -z "$RENDER_API_KEY" ]; then missing+=("RENDER_API_KEY"); fi

          # Check service ID based on environment from previous step
          ENV="${{ steps.check.outputs.environment }}"
          if [ "$ENV" = "production" ]; then
            if [ -z "$RENDER_SERVICE_ID_PROD" ]; then missing+=("RENDER_SERVICE_ID_PROD"); fi
          else
            if [ -z "$RENDER_SERVICE_ID_TEST" ]; then missing+=("RENDER_SERVICE_ID_TEST"); fi
          fi

          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Missing required secrets: ${missing[*]}"
            echo ""
            echo "Please add these secrets in GitHub:"
            echo "  Settings → Secrets and variables → Actions → New repository secret"
            echo ""
            echo "Required (PostgreSQL):"
            echo "  - PGHOST"
            echo "  - PGPORT (usually 5432)"
            echo "  - PGUSER"
            echo "  - PGPASSWORD"
            echo "  - PGDATABASE"
            echo ""
            echo "Required (Render):"
            echo "  - RENDER_API_KEY"
            echo "  - RENDER_SERVICE_ID_TEST (for staging)"
            echo "  - RENDER_SERVICE_ID_PROD (for production)"
            exit 1
          fi

          echo "✅ All required secrets present"

  migrate-database:
    needs: precheck
    concurrency:
      group: migrate-${{ needs.precheck.outputs.environment }}
      cancel-in-progress: true
    uses: ./.github/workflows/flyway-migrate.yml
    with:
      environment: ${{ needs.precheck.outputs.environment }}
    secrets:
      PGHOST: ${{ secrets.PGHOST }}
      PGPORT: ${{ secrets.PGPORT }}
      PGUSER: ${{ secrets.PGUSER }}
      PGPASSWORD: ${{ secrets.PGPASSWORD }}
      PGDATABASE: ${{ secrets.PGDATABASE }}

  deploy:
    needs: [precheck, migrate-database]
    if: needs.migrate-database.outputs.success == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ needs.precheck.outputs.environment }}
      cancel-in-progress: true
    environment: ${{ needs.precheck.outputs.environment }}
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ needs.precheck.outputs.environment == 'production' && secrets.RENDER_SERVICE_ID_PROD || secrets.RENDER_SERVICE_ID_TEST }}
      DISPLAY_ENV: ${{ needs.precheck.outputs.environment == 'production' && 'Production' || 'Staging' }}
      APP_ENV: ${{ needs.precheck.outputs.environment == 'production' && 'production' || 'test' }}
      ENV: ${{ needs.precheck.outputs.environment == 'production' && 'prod' || 'test' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        if: success()
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Validate Render configuration
        if: success()
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "ERROR: RENDER_API_KEY is not set"
            exit 1
          fi
          if [ -z "$RENDER_SERVICE_ID" ]; then
            echo "ERROR: RENDER_SERVICE_ID is not set"
            exit 1
          fi
          echo "✅ Render configuration validated"
          echo "   Environment: $DISPLAY_ENV"
          echo "   Service ID: $RENDER_SERVICE_ID"

      - name: Trigger Render deployment
        id: trigger
        if: success()
        env:
          RENDER_API_KEY: ${{ env.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ env.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail

          echo "🚀 Triggering deployment for $DISPLAY_ENV..."

          # Wait for any existing in-progress deployment to finish (max 15 min)
          max_wait=30
          for i in $(seq 1 $max_wait); do
            echo "Checking for in-progress deployments (attempt $i/$max_wait)..."
            response=$(curl -s \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" || true)

            # Check if response is valid JSON array
            if echo "$response" | jq -e 'type == "array"' >/dev/null 2>&1; then
              deploy_status=$(echo "$response" | jq -r '.[0].status // "empty"')
              if [ "$deploy_status" = "empty" ]; then
                echo "  No existing deployments found, proceeding..."
                break
              fi
              if [[ "$deploy_status" =~ ^(live|succeeded|errored|failed|canceled|build_failed|update_failed|upload_failed)$ ]]; then
                echo "  Latest deployment is in terminal state: $deploy_status, proceeding..."
                break
              fi
              echo "  Deployment still in progress (status: $deploy_status), waiting 30s..."
            else
              echo " ⚠️  Unexpected response format, assuming no in-progress deployments"
              echo "  Response: ${response:0:200}"
            fi
            sleep 30
          done

          # Trigger new deployment
          echo "Triggering new deployment..."
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          if [[ ! "$http_code" =~ ^(200|201|202)$ ]]; then
            echo "❌ Deploy trigger failed (HTTP $http_code):"
            echo "$body" | jq . 2>/dev/null || echo "${body:0:500}"
            exit 1
          fi

          # Validate response is JSON and extract deploy_id
          if ! echo "$body" | jq -e 'type == "object" and .id' >/dev/null 2>&1; then
            echo "❌ Response is not a valid deployment object or missing 'id':"
            echo "$body" | jq . 2>/dev/null || echo "${body:0:500}"
            exit 1
          fi

          deploy_id=$(echo "$body" | jq -r -e '.id')
          echo "deploy_id=$deploy_id" >> $GITHUB_OUTPUT
          echo "✅ Deployment triggered: $deploy_id"

      - name: Monitor deployment
        id: monitor
        if: success()
        env:
          RENDER_API_KEY: ${{ env.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ env.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail

          deploy_id="${{ steps.trigger.outputs.deploy_id }}"
          echo "Monitoring deployment: $deploy_id"

          if [ -z "$deploy_id" ] || [ "$deploy_id" = "null" ]; then
            echo "❌ Invalid deploy_id from trigger step: '$deploy_id'"
            echo "   Trigger step output: ${{ steps.trigger.outputs }}"
            exit 1
          fi

          # Poll for status, up to 120 checks (60 minutes)
          for i in $(seq 1 120); do
            echo "[$i/120] Checking deployment status..."

            # Fetch deployment details with error handling
            response=$(curl -s -w "\n%{http_code}" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$deploy_id")
            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | sed '$d')

            # Check for HTTP errors
            if [[ ! "$http_code" =~ ^(200)$ ]]; then
              echo "❌ API request failed (HTTP $http_code):"
              echo "$body" | jq . 2>/dev/null || echo "${body:0:500}"
              exit 1
            fi

            # Validate response is JSON object
            if ! echo "$body" | jq -e 'type == "object"' >/dev/null 2>&1; then
              echo "❌ Response is not a valid JSON object:"
              echo "${body:0:500}"
              exit 1
            fi

            # Extract status safely
            status=$(echo "$body" | jq -r -e '.status' 2>/dev/null || echo "unknown")
            echo "   Status: $status"

            # Success conditions
            if [[ "$status" == "live" ]] || [[ "$status" == "succeeded" ]]; then
              echo "✅ Deployment successful!"
              exit 0
            fi

            # Failure conditions (terminal states)
            if [[ "$status" =~ ^(errored|failed|canceled|build_failed|update_failed|upload_failed)$ ]]; then
              echo "❌ Deployment failed with status: $status"
              echo "Deployment details:"
              echo "$body" | jq .
              exit 1
            fi

            # Still in progress, wait before next check
            echo "   Still in progress (status: $status), waiting 30 seconds..."
            sleep 30
          done

          echo "❌ TIMEOUT: Deployment did not complete within 60 minutes"
          echo "Last known status: $status"
          exit 1

      - name: Health check
        if: success()
        env:
          APP_ENV: ${{ needs.precheck.outputs.environment == 'production' && 'production' || 'test' }}
        run: |
          # Determine service URL based on environment (same as smoke test)
          if [ "$APP_ENV" = "production" ] || [ "$APP_ENV" = "prod" ]; then
            base_url="https://playnexus-prod.onrender.com"
          else
            base_url="https://playnexus-test.onrender.com"
          fi
          echo "Service URL: $base_url"

          endpoints=("/health" "/api/auth/me")
          for endpoint in "${endpoints[@]}"; do
            echo "Checking $base_url$endpoint..."
            code=$(curl -s -o /dev/null -w "%{http_code}" "$base_url$endpoint")
            if [[ "$code" =~ ^(200|401)$ ]]; then
              echo "  ✅ OK ($code)"
            else
              echo "  ❌ FAILED ($code)"
              exit 1
            fi
          done

          echo "All health checks passed!"

      - name: Install Node.js dependencies
        if: success()
        run: |
          echo "📦 Installing test dependencies..."
          npm install --no-save playwright
          npx playwright install chromium --with-deps
          echo "✅ Dependencies installed"

      - name: Smoke test
        if: success()
        env:
          APP_ENV: ${{ needs.precheck.outputs.environment }}
        run: |
          # Determine site URL based purely on branch (no Render API call)
          if [ "$APP_ENV" = "production" ] || [ "$APP_ENV" = "prod" ]; then
            SITE_URL="https://playnexus-prod.onrender.com"
          else
            SITE_URL="https://playnexus-test.onrender.com"
          fi
          echo "Running smoke test on: $SITE_URL"
          SITE_URL="$SITE_URL" node tests/smoke.test.js

      - name: Upload smoke test screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-screenshot-${{ needs.precheck.outputs.environment }}
          path: screenshot.png
          retention-days: 7
