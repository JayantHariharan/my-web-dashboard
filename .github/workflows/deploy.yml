name: Branch‑Based Deployment & Smoke Test

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  workflow_dispatch:

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest
    env:
      # Production for main, test for everything else (develop, feature branches)
      APP_ENV: ${{ contains(github.ref, 'refs/heads/main') && 'production' || 'test' }}
      SITE_URL: ${{ contains(github.ref, 'refs/heads/main') && 'https://playnexus-prod.onrender.com' || 'https://playnexus-test.onrender.com' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install minimal dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Verify environment
        run: |
          echo "Deploying to: ${APP_ENV}"
          echo "Target URL: ${SITE_URL}"

      # Health Check (direct API calls)
      - name: Health Check
        run: |
          base_url="${SITE_URL}"
          endpoints=("/health" "/api/auth/me")
          for endpoint in "${endpoints[@]}"; do
            echo "Checking ${base_url}${endpoint}..."
            response=$(curl -s -o /dev/null -w "%{http_code}" "${base_url}${endpoint}")
            if [[ "$response" == 200 || "$response" == 401 ]]; then
              echo " ✅ OK (${response})"
            else
              echo " ❌ FAILED (${response})"
              exit 1
            fi
          done
          echo "All health checks passed!"

      # Smoke Test (API‑centric script)
      - name: Smoke Test
        run: |
          echo "Running smoke test on: ${SITE_URL}"
          SITE_URL="${SITE_URL}" node tests/smoke.test.js

      - name: Upload smoke test artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-${APP_ENV}
          path: screenshot.png
          retention-days: 7