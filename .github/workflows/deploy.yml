name: PlayNexus CD (Deploy & Test)

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  workflow_dispatch:

jobs:
  deploy-and-test:
    name: ${{ github.ref_name == 'main' && 'Production Deploy' || 'Test Deploy' }}
    runs-on: ubuntu-latest

    env:
      # Using ref_name for cleaner and more robust branching logic
      APP_ENV: ${{ github.ref_name == 'main' && 'production' || 'test' }}
      SITE_URL: ${{ github.ref_name == 'main' && 'https://playnexus-prod.onrender.com' || 'https://playnexus-test.onrender.com' }}
      RENDER_API_KEY: ${{ github.ref_name == 'main' && secrets.RENDER_API_KEY_PROD || secrets.RENDER_API_KEY_TEST }}
      RENDER_SERVICE_ID: ${{ github.ref_name == 'main' && secrets.RENDER_SERVICE_ID_PROD || secrets.RENDER_SERVICE_ID_TEST }}
      RENDER_DEPLOY_HOOK_URL: ${{ github.ref_name == 'main' && secrets.RENDER_DEPLOY_HOOK_PROD || secrets.RENDER_DEPLOY_HOOK_TEST }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Capture Current Deploy
        run: |
          set -euo pipefail
          current_deploy_response="$(curl -fsS "https://api.render.com/v1/services/${{ env.RENDER_SERVICE_ID }}/deploys?limit=1" \
            -H "Authorization: Bearer ${{ env.RENDER_API_KEY }}" \
            -H "Accept: application/json")"

          current_deploy_id="$(echo "$current_deploy_response" | jq -r '.deploys[0].id // .[0].id // empty')"
          echo "PREVIOUS_RENDER_DEPLOY_ID=$current_deploy_id" >> "$GITHUB_ENV"
          echo "Current deploy before trigger: ${current_deploy_id:-<none>}"

      - name: Trigger Render Deployment
        run: |
          set -euo pipefail
          echo "Triggering deploy for branch: ${{ github.ref_name }} to env: ${{ env.APP_ENV }}"
          echo "Target Service: ${{ env.RENDER_SERVICE_ID }}"
          echo "Commit SHA: ${{ github.sha }}"

          if [ -z "${RENDER_DEPLOY_HOOK_URL}" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_URL is not configured for this environment."
            exit 1
          fi

          separator='?'
          case "$RENDER_DEPLOY_HOOK_URL" in
            *\?*) separator='&' ;;
          esac
          deploy_hook_with_ref="${RENDER_DEPLOY_HOOK_URL}${separator}ref=${{ github.sha }}"

          curl -fsS -X POST "$deploy_hook_with_ref" > /dev/null
          echo "Deploy hook accepted the request."

      - name: Detect New Render Deploy
        run: |
          set -euo pipefail
          echo "Looking for the deploy started by this workflow..."

          for attempt in {1..18}; do
            deploys_response="$(curl -fsS "https://api.render.com/v1/services/${{ env.RENDER_SERVICE_ID }}/deploys?limit=5" \
              -H "Authorization: Bearer ${{ env.RENDER_API_KEY }}" \
              -H "Accept: application/json")"

            deploy_id="$(echo "$deploys_response" | jq -r '.deploys[0].id // .[0].id // empty')"
            deploy_commit="$(echo "$deploys_response" | jq -r '.deploys[0].commit.id // .deploys[0].commitId // .[0].commit.id // .[0].commitId // empty')"

            if [ -n "$deploy_id" ] && [ "$deploy_id" != "${PREVIOUS_RENDER_DEPLOY_ID:-}" ]; then
              echo "RENDER_DEPLOY_ID=$deploy_id" >> "$GITHUB_ENV"
              echo "Detected new Render deploy id: $deploy_id"
              echo "Render reported commit: ${deploy_commit:-unknown}"
              exit 0
            fi

            echo "Attempt $attempt/18: waiting for a new deploy to appear..."
            sleep 10
          done

          echo "::error::Could not find the new Render deploy after triggering the deploy hook."
          exit 1

      - name: Wait for Render Deployment
        run: |
          set -euo pipefail
          echo "Waiting for Render deploy ${RENDER_DEPLOY_ID} to finish..."

          for attempt in {1..60}; do
            deploy_status_response="$(curl -fsS "https://api.render.com/v1/services/${{ env.RENDER_SERVICE_ID }}/deploys/${RENDER_DEPLOY_ID}" \
              -H "Authorization: Bearer ${{ env.RENDER_API_KEY }}" \
              -H "Accept: application/json")"

            status="$(echo "$deploy_status_response" | jq -r '.deploy.status // .status // .deploy.state // .state // "unknown"' | tr '[:upper:]' '[:lower:]')"
            echo "Attempt $attempt/60: deploy status is '$status'"

            case "$status" in
              live|deployed|success|build_success|update_success)
                echo "Render deployment completed."
                exit 0
                ;;
              build_failed|failed|error|canceled|cancelled|update_failed|pre_deploy_failed)
                echo "::error::Render deployment failed with status '$status'."
                echo "$deploy_status_response"
                exit 1
                ;;
            esac

            sleep 10
          done

          echo "::error::Timed out waiting for Render deployment to finish."
          exit 1

      - name: Wait for Service Health
        run: |
          echo "Checking health of ${SITE_URL}/health..."

          for i in {1..18}; do
            if curl -fsS "${SITE_URL}/health"; then
              exit 0
            fi

            echo "Health check attempt $i/18 failed. Retrying in 10 seconds..."
            sleep 10
          done

          echo "::error::Service health check never became ready."
          exit 1

      - name: Verify Environment
        run: |
          node -v
          npm -v

      - name: Run Smoke Tests
        run: |
          echo "Running automated smoke tests against: ${SITE_URL}"
          SITE_URL="${SITE_URL}" node tests/smoke.test.js
