name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual triggering from GitHub Actions UI

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ============================================================================
  # QUALITY GATE - Runs on all branches
  # ============================================================================
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Cleanup build artifacts
        run: |
          echo "🧹 Cleaning build artifacts and cache..."
          python -m pip cache purge
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find . -type f -name "*.pyc" -delete
          rm -rf .mypy_cache .pytest_cache .coverage htmlcov 2>/dev/null || true
          echo "✅ Cleanup complete"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 mypy black bandit

      - name: Syntax check
        run: python -m py_compile src/backend/main.py

      - name: Lint (critical errors)
        run: |
          echo "🔍 Running critical flake8 checks..."
          flake8 src/backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: false

      - name: Lint (full)
        run: |
          echo "🔍 Running full flake8 linting..."
          flake8 src/backend/ --max-line-length=88 --extend-ignore=E203,W503
        continue-on-error: true  # Allow warnings

      - name: Type check (MyPy)
        run: |
          echo "🔍 Running MyPy type checking..."
          mypy src/backend/main.py --ignore-missing-imports --no-strict-optional
        continue-on-error: true  # Allow warnings

      - name: Security scan (Bandit)
        run: |
          echo "🔒 Running security scan..."
          bandit -r src/backend/ -f json -o bandit-report.json || true
          # Fail on high severity issues only
          if grep -q '"issue_severity": "HIGH"' bandit-report.json 2>/dev/null; then
            echo "❌ High severity security issues found!"
            cat bandit-report.json
            exit 1
          fi
        continue-on-error: true

      - name: Format check (Black)
        run: |
          echo "🎨 Checking code formatting..."
          black --check src/backend/
        # Fail the workflow if code is not properly formatted

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            bandit-report.json
            . Coverage reports would go here if pytest added
          retention-days: 7  # Auto-delete after 7 days

  # ============================================================================
  # DEPLOYMENT - Only for main and develop branches (not PRs)
  # ============================================================================
  deploy:
    needs: quality
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure deployment environment
        id: env-config
        run: |
          echo "=========================================="
          echo "⚙️  Configuring deployment environment"
          echo "Branch: ${GITHUB_REF##*/}"
          echo "=========================================="

          # Determine environment based on branch
          if [ "${GITHUB_REF##*/}" = "main" ]; then
            echo "deploy_env=production" >> $GITHUB_OUTPUT
            echo "display_env=Production" >> $GITHUB_OUTPUT
            echo "app_env=production" >> $GITHUB_OUTPUT
            # API Key: Use same key for both environments (you have only one)
            echo "render_api_key=${{ secrets.RENDER_API_KEY }}" >> $GITHUB_ENV
            # Service ID: Different service for production
            echo "render_service_id=${{ secrets.RENDER_SERVICE_ID }}" >> $GITHUB_ENV
            # Environment Group ID (optional)
            echo "render_env_group_id=${{ secrets.RENDER_ENV_GROUP_ID }}" >> $GITHUB_ENV
          else
            echo "deploy_env=staging" >> $GITHUB_OUTPUT
            echo "display_env=Staging/Test" >> $GITHUB_OUTPUT
            echo "app_env=test" >> $GITHUB_OUTPUT
            # API Key: Same key for staging (only one key)
            echo "render_api_key=${{ secrets.RENDER_API_KEY }}" >> $GITHUB_ENV
            # Service ID: Different service for staging (test variant)
            echo "render_service_id=${{ secrets.RENDER_SERVICE_ID_TEST }}" >> $GITHUB_ENV
            # Environment Group ID (optional) - test variant
            echo "render_env_group_id=${{ secrets.RENDER_ENV_GROUP_ID_TEST }}" >> $GITHUB_ENV
          fi

          echo "APP_ENV=${{ steps.env-config.outputs.app_env }}" >> $GITHUB_ENV

      - name: Validate secrets
        run: |
          echo "🔐 Validating required secrets..."

          missing_secrets=()

          if [ -z "$render_api_key" ]; then
            missing_secrets+=("RENDER_API_KEY")
          fi

          if [ -z "$render_service_id" ]; then
            if [ "${GITHUB_REF##*/}" = "main" ]; then
              missing_secrets+=("RENDER_SERVICE_ID (production service)")
            else
              missing_secrets+=("RENDER_SERVICE_ID_TEST (staging service)")
            fi
          fi

          # Optional: Environment Group ID (warn if missing)
          if [ -z "$render_env_group_id" ]; then
            echo "⚠️  RENDER_ENV_GROUP_ID not set - skipping environment group association"
          fi

          if [ ${#missing_secrets[@]} -gt 0 ]; then
            echo "❌ Missing required secrets:"
            for secret in "${missing_secrets[@]}"; do
              echo "   - $secret"
            done
            echo ""
            echo "💡 Tip: You need ONE API key (RENDER_API_KEY) for both environments."
            echo "   But you need separate service IDs: RENDER_SERVICE_ID (prod) and"
            echo "   RENDER_SERVICE_ID_TEST (staging)."
            echo ""
            echo "Please add these secrets in GitHub repository settings:"
            echo "Settings → Secrets and variables → Actions"
            exit 1
          fi

          echo "✅ All required secrets present"
          echo "   API Key: ${render_api_key:0:10}... (masked)"
          echo "   Service ID: ${render_service_id:0:12}..."
          echo "   Env Group ID: ${render_env_group_id:-Not set}"

      - name: Associate Environment Group
        if: env.render_env_group_id != ''
        env:
          RENDER_API_KEY: ${{ env.render_api_key }}
          RENDER_SERVICE_ID: ${{ env.render_service_id }}
          RENDER_ENV_GROUP_ID: ${{ env.render_env_group_id }}
        run: |
          echo "🔗 Associating service with environment group..."

          response=$(curl -s \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" \
            -H "Authorization: Bearer ${RENDER_API_KEY}")

          current_groups=$(echo "$response" | jq -r '.envVarsIncludeFromGroup // []')

          if echo "$current_groups" | grep -q "$RENDER_ENV_GROUP_ID"; then
            echo "✅ Already associated with environment group"
          else
            echo "📋 Current groups: $current_groups"
            echo "🎯 Adding group: $RENDER_ENV_GROUP_ID"

            patch_response=$(curl -s -w "\n%{http_code}" -X PATCH \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"envVarsIncludeFromGroup\":[\"$RENDER_ENV_GROUP_ID\"]}")

            http_code=$(echo "$patch_response" | tail -n1)
            patch_body=$(echo "$patch_response" | sed '$d')

            if [[ "$http_code" =~ ^(200|201|204)$ ]]; then
              echo "✅ Environment group associated successfully"
            else
              echo "❌ Association failed (HTTP $http_code)"
              echo "Response: $patch_body"
              exit 1
            fi
          fi

      - name: Trigger Render deployment
        id: trigger-deploy
        env:
          RENDER_API_KEY: ${{ env.render_api_key }}
          RENDER_SERVICE_ID: ${{ env.render_service_id }}
        run: |
          set -e

          echo "=========================================="
          echo "🚀 Triggering deployment to ${{ steps.env-config.outputs.display_env }}"
          echo "Branch: ${GITHUB_REF##*/}"
          echo "Service ID: ${RENDER_SERVICE_ID}"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "=========================================="

          # Check for in-progress deploys
          echo "🔍 Checking for in-progress deployments..."
          max_wait_attempts=30  # 15 minutes max (30 * 30s)
          wait_attempts=0

          while [ $wait_attempts -lt $max_wait_attempts ]; do
            deploys=$(curl -s \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
              -H "Authorization: Bearer ${RENDER_API_KEY}")

            latest_deploy=$(echo "$deploys" | jq -r '.[0] // empty')
            if [ -z "$latest_deploy" ] || [ "$latest_deploy" = "null" ]; then
              echo "   No deploy history found"
              break
            fi

            status=$(echo "$latest_deploy" | jq -r '.status // empty')
            deploy_id=$(echo "$latest_deploy" | jq -r '.id // empty')

            if [[ "$status" =~ ^(live|succeeded|errored|failed|canceled)$ ]]; then
              echo "   ✅ Previous deploy ($deploy_id) is $status - ready"
              break
            else
              echo "   ⏳ Deploy $deploy_id is $status - waiting 30s..."
              sleep 30
              wait_attempts=$((wait_attempts + 1))
            fi
          done

          if [ $wait_attempts -ge $max_wait_attempts ]; then
            echo "❌ TIMEOUT: Previous deploy still in progress after 15 minutes"
            echo "   Please check Render dashboard and cancel if necessary"
            exit 1
          fi

          # Trigger new deployment
          echo "📤 Triggering new deployment..."
          echo "   API: POST /v1/services/${RENDER_SERVICE_ID}/deploys"
          trigger_response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}')

          http_status=$(echo "$trigger_response" | grep "HTTP_STATUS:" | cut -d: -f2)
          response_body=$(echo "$trigger_response" | sed '/HTTP_STATUS:/d')

          echo "📨 Response (HTTP $http_status):"
          # Try to format as JSON, fall back to raw
          echo "$response_body" | jq '.' 2>/dev/null || echo "$response_body"

          # Check HTTP status first
          if [[ ! "$http_status" =~ ^(2|3)[0-9]{2}$ ]]; then
            echo "❌ HTTP $http_status error from Render API"
            error_msg=$(echo "$response_body" | jq -r '.error // .message // .detail // empty')
            if [ -n "$error_msg" ]; then
              echo "   Error: $error_msg"
            fi
            echo ""
            echo "💡 Common causes:"
            echo "   - 401: Invalid or expired API key"
            echo "   - 403: API key lacks permission for this service"
            echo "   - 404: Service ID not found (check RENDER_SERVICE_ID[_TEST])"
            echo "   - 429: Rate limit exceeded"
            echo "   - 500: Render server error (try again later)"
            exit 1
          fi

          deploy_id=$(echo "$response_body" | jq -r '.id // empty')
          if [ -z "$deploy_id" ]; then
            echo "❌ Failed to create deployment - no deploy ID in response"
            echo "   Response body:"
            echo "$response_body" | jq '.' 2>/dev/null || echo "$response_body"
            echo ""
            echo "💡 Check:"
            echo "   - Service exists and is not suspended"
            echo "   - API key has correct permissions"
            echo "   - Render account is active"
            exit 1
          fi

          echo "✅ Deployment triggered: $deploy_id"
          echo "deploy_id=$deploy_id" >> $GITHUB_OUTPUT

      - name: Monitor deployment
        id: monitor
        env:
          RENDER_API_KEY: ${{ env.render_api_key }}
          RENDER_SERVICE_ID: ${{ env.render_service_id }}
        run: |
          set -e
          deploy_id="${{ steps.trigger-deploy.outputs.deploy_id }}"

          echo "⏳ Monitoring deployment progress..."
          echo "Deploy ID: $deploy_id"
          echo ""

          for i in $(seq 1 60); do
            response=$(curl -s \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${deploy_id}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}")

            # Check if we got a valid response
            if echo "$response" | grep -q '"error"'; then
              echo "❌ Error from Render API:"
              echo "$response" | jq '.' 2>/dev/null || echo "$response"
              exit 1
            fi

            status=$(echo "$response" | jq -r '.status // empty')
            description=$(echo "$response" | jq -r '.description // empty')

            # Log progress with timestamps
            timestamp=$(date -u +%H:%M:%S)
            echo "[$timestamp] Attempt $i/60 - Status: ${status:-<none>}"
            [ -n "$description" ] && echo "   ➜ $description"

            # If status is empty, show full response to debug
            if [ -z "$status" ]; then
              echo "⚠️  WARNING: Empty status in response. Full response:"
              echo "$response" | jq '.' 2>/dev/null || echo "$response"
              echo ""
            fi

            case $status in
              live|succeeded)
                echo ""
                echo "✅ Deployment completed successfully!"
                service_url=$(echo "$response" | jq -r '.service.url // "N/A"')
                echo "🌐 Service URL: https://$service_url"
                echo "DEPLOY_URL=https://$service_url" >> $GITHUB_ENV
                break
                ;;
              errored|failed|canceled|build_failed)
                echo ""
                echo "❌ Deployment failed - status: $status"
                echo "📋 Failure details:"
                echo "$response" | jq '.' 2>/dev/null || echo "$response"
                exit 1
                ;;
              *)
                # Still in progress (building, uploading, etc.)
                sleep 30
                ;;
            esac
          done

          # Final status check
          final_response=$(curl -s \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${deploy_id}" \
            -H "Authorization: Bearer ${RENDER_API_KEY}")
          final_status=$(echo "$final_response" | jq -r '.status')

          if ! [[ "$final_status" =~ ^(live|succeeded)$ ]]; then
            echo "❌ Deployment incomplete. Final status: $final_status"
            exit 1
          fi

      - name: Health check
        if: success()
        env:
          RENDER_API_KEY: ${{ env.render_api_key }}
          RENDER_SERVICE_ID: ${{ env.render_service_id }}
          DEPLOY_URL: ${{ env.DEPLOY_URL }}
        run: |
          echo "🏥 Performing health checks on ${{ steps.env-config.outputs.display_env }}..."
          echo "🌐 URL: ${DEPLOY_URL:-Retrieving...}"

          # Get service URL if not already set
          if [ -z "$DEPLOY_URL" ]; then
            url=$(curl -s \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" | jq -r '.service.url')
            DEPLOY_URL="https://$url"
          fi

          endpoints=(/health /api/auth/login)
          failed_endpoints=()

          for endpoint in "${endpoints[@]}"; do
            echo "  Checking ${DEPLOY_URL}${endpoint}..."
            success=false

            for attempt in $(seq 1 30); do
              http_code=$(curl -s -o /dev/null -w "%{http_code}" "${DEPLOY_URL}${endpoint}" 2>/dev/null || echo "000")

              if [[ "$http_code" =~ ^(200|302|401)$ ]]; then
                echo "    ✅ OK (HTTP $http_code)"
                success=true
                break
              elif [[ "$http_code" =~ ^(5..)$ ]]; then
                echo "    ⚠️  Server error (HTTP $http_code) - retrying..."
              else
                echo "    ⚠️  Unexpected code $http_code - retrying..."
              fi

              sleep 5
            done

            if [ "$success" = false ]; then
              echo "    ❌ FAILED after 30 attempts"
              failed_endpoints+=("$endpoint")
            fi
          done

          if [ ${#failed_endpoints[@]} -gt 0 ]; then
            echo ""
            echo "❌ Health check failed for endpoints: ${failed_endpoints[*]}"
            exit 1
          fi

          echo ""
          echo "✅ All health checks passed!"

      - name: Smoke test (deployed URL)
        if: success()
        env:
          DEPLOY_URL: ${{ env.DEPLOY_URL }}
        run: |
          echo "🧪 Running smoke test on deployed site..."

          if [ -z "$DEPLOY_URL" ]; then
            echo "❌ DEPLOY_URL not set"
            exit 1
          fi

          # Install Playwright dependencies
          echo "📦 Installing test dependencies..."
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps 2>&1 | grep -E "(Downloading|Installed|✓)" || true

          # Run smoke test
          echo "▶️  Executing smoke test..."
          SITE_URL="$DEPLOY_URL" node tests/smoke.test.js

          echo "✅ Smoke test passed!"

      - name: Deployment summary
        if: always()
        run: |
          echo "=========================================="
          echo "📊 DEPLOYMENT SUMMARY"
          echo "=========================================="
          echo "Branch:        ${GITHUB_REF##*/}"
          echo "Environment:   ${{ steps.env-config.outputs.display_env }}"
          echo "App Env:       $APP_ENV"
          echo "Service ID:    ${{ env.render_service_id }}"
          echo "Deploy ID:     ${{ steps.trigger-deploy.outputs.deploy_id }}"
          echo "Service URL:   ${DEPLOY_URL:-N/A}"
          echo "Commit:        ${{ github.sha }}"
          echo "Actor:         ${{ github.actor }}"
          echo "=========================================="
