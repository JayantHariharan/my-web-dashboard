name: Deploy to Render

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Syntax check
        run: python -m py_compile src/backend/main.py

      - name: Lint (critical errors only)
        run: |
          flake8 src/backend/ --count --select=E9,F63,F7,F82 --isolated
        continue-on-error: false

  deploy-prod:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Associate Environment Group (PROD)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_PROD }}
          RENDER_ENV_GROUP_ID: ${{ secrets.RENDER_ENV_GROUP_ID_PROD }}
        run: |
          # Skip if RENDER_ENV_GROUP_ID_PROD is not set
          if [ -z "$RENDER_ENV_GROUP_ID" ]; then
            echo "ℹ️  RENDER_ENV_GROUP_ID_PROD not set, skipping environment group association"
            exit 0
          fi

          echo "Ensuring PRODUCTION service is associated with environment group..."
          echo "Environment Group ID: ${RENDER_ENV_GROUP_ID:0:8}... (truncated for security)"

          # Get current service configuration
          response=$(curl -s \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" \
            -H "Authorization: Bearer ${RENDER_API_KEY}")

          # Check if group is already associated
          current_groups=$(echo "$response" | jq -r '.envVarsIncludeFromGroup // []')

          if echo "$current_groups" | grep -q "$RENDER_ENV_GROUP_ID"; then
            echo "✅ Environment group already associated"
          else
            echo "🔗 Associating environment group..."

            # Associate the group
            patch_response=$(curl -s -w "\n%{http_code}" -X PATCH \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"envVarsIncludeFromGroup\":[\"$RENDER_ENV_GROUP_ID\"]}")

            http_code=$(echo "$patch_response" | tail -n1)
            patch_body=$(echo "$patch_response" | sed '$d')

            echo "PATCH response (HTTP $http_code): $patch_body"

            if [[ "$http_code" =~ ^(200|201|204)$ ]]; then
              echo "✅ Association successful"
            else
              echo "❌ Association failed with HTTP $http_code"
              echo "Response: $patch_body"
              exit 1
            fi
          fi

      - name: Deploy to Render (Production)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_PROD }}
        run: |
          set -e

          echo "=========================================="
          echo "🚀 Deploying to Render (PRODUCTION)"
          echo "Service ID: ${RENDER_SERVICE_ID:0:12}..."
          echo "=========================================="

          # Check for in-progress deploys and wait if needed
          echo "🔍 Checking for in-progress deploys..."
          max_wait_minutes=15
          waited=0

          while [ $waited -lt $((max_wait_minutes * 2)) ]; do
            current_deploy=$(curl -s \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" | jq -r '.[0] // empty')

            if [ -z "$current_deploy" ]; then
              echo "   No deploy history found"
              break
            fi

            current_status=$(echo "$current_deploy" | jq -r '.status')
            current_id=$(echo "$current_deploy" | jq -r '.id')

            if [[ "$current_status" =~ ^(live|succeeded|errored|failed|canceled)$ ]]; then
              echo "   Previous deploy ($current_id) is $current_status - ready to deploy"
              break
            else
              echo "   Deploy $current_id is $current_status - waiting..."
              sleep 30
              waited=$((waited + 1))
            fi
          done

          if [ $waited -ge $((max_wait_minutes * 2)) ]; then
            echo "⚠️  Timed out waiting for in-progress deploy to complete"
            echo "   You may need to cancel it manually in Render dashboard"
            exit 1
          fi

          # Now trigger new deploy
          echo "📤 Triggering new deploy..."
          trigger_response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json")

          http_status=$(echo "$trigger_response" | grep "HTTP_STATUS:" | cut -d: -f2)
          response_body=$(echo "$trigger_response" | sed '/HTTP_STATUS:/d')

          echo "📨 Response (HTTP $http_status):"
          echo "$response_body" | jq '.' 2>/dev/null || echo "$response_body"

          # Extract deploy ID safely
          deploy_id=$(echo "$response_body" | jq -r '.id // empty')
          if [ -z "$deploy_id" ]; then
            echo "❌ Failed to create deploy - no deploy ID in response"
            error_msg=$(echo "$response_body" | jq -r '.error // .message // empty')
            if [ -n "$error_msg" ]; then
              echo "   Error: $error_msg"
            fi
            echo "   Another deploy may still be running. Check Render dashboard."
            exit 1
          fi

          echo "✅ Deploy triggered: $deploy_id"
          echo "DEPLOY_ID=$deploy_id" >> $GITHUB_ENV

          echo "⏳ Waiting for deployment to complete..."

          for i in {1..60}; do
            echo "[$i/60] Checking status..."

            response=$(curl -s \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${deploy_id}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}")
            status=$(echo "$response" | jq -r '.status')

            case $status in
              live|succeeded)
                echo "✅ Deploy succeeded"
                service_url=$(echo "$response" | jq -r '.service.url // "N/A"')
                echo "🌐 Service URL: https://$service_url"
                break
                ;;
              errored|failed|canceled|build_failed)
                echo "❌ Deploy failed - status: $status"
                echo "Failure details:"
                echo "$response" | jq '.' 2>/dev/null
                exit 1
                ;;
              *)
                echo "   Current status: $status - waiting..."
                sleep 30
                ;;
            esac
          done

          # Final verification
          echo "🔍 Final verification..."
          final_response=$(curl -s \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${deploy_id}" \
            -H "Authorization: Bearer ${RENDER_API_KEY}")
          final_status=$(echo "$final_response" | jq -r '.status')

          if [ "$final_status" != "live" ] && [ "$final_status" != "succeeded" ]; then
            echo "❌ Deploy incomplete - final status: $final_status"
            echo "Response:"
            echo "$final_response" | jq '.' 2>/dev/null
            exit 1
          fi

          echo "=========================================="
          echo "✅ Deploy workflow completed successfully!"
          echo "=========================================="

      - name: Health Check (Production)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_PROD }}
        run: |
          echo "🏥 Performing health check (PRODUCTION)..."

          url=$(curl -s \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" | jq -r '.service.url')

          if [ -z "$url" ] || [ "$url" = "null" ]; then
            echo "❌ Could not retrieve service URL from Render API"
            exit 1
          fi

          echo "🌐 Service URL: https://$url"

          endpoints=(/health /api/auth/login)
          failed_endpoints=()

          for endpoint in "${endpoints[@]}"; do
            echo "  Checking $endpoint..."
            success=false

            for i in {1..30}; do
              code=$(curl -s -o /dev/null -w "%{http_code}" "https://$url$endpoint" || echo "000")
              if [[ "$code" =~ ^(200|302)$ ]]; then
                echo "    ✅ OK (HTTP $code)"
                success=true
                break
              fi
              sleep 5
            done

            if [ "$success" = false ]; then
              echo "    ❌ FAILED after 30 attempts"
              failed_endpoints+=("$endpoint")
            fi
          done

          if [ ${#failed_endpoints[@]} -gt 0 ]; then
            echo "❌ Health check failed for: ${failed_endpoints[*]}"
            exit 1
          fi

          echo "✅ All health checks passed!"

  deploy-test:
    needs: test
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Associate Environment Group (TEST)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY_TEST }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_TEST }}
          RENDER_ENV_GROUP_ID: ${{ secrets.RENDER_ENV_GROUP_ID_TEST }}
        run: |
          # Skip if RENDER_ENV_GROUP_ID_TEST is not set
          if [ -z "$RENDER_ENV_GROUP_ID" ]; then
            echo "ℹ️  RENDER_ENV_GROUP_ID_TEST not set, skipping environment group association"
            exit 0
          fi

          echo "Ensuring TEST service is associated with environment group..."
          echo "Environment Group ID: ${RENDER_ENV_GROUP_ID:0:8}... (truncated for security)"

          # Get current service configuration
          response=$(curl -s \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" \
            -H "Authorization: Bearer ${RENDER_API_KEY}")

          # Check if group is already associated
          current_groups=$(echo "$response" | jq -r '.envVarsIncludeFromGroup // []')

          if echo "$current_groups" | grep -q "$RENDER_ENV_GROUP_ID"; then
            echo "✅ Environment group already associated"
          else
            echo "🔗 Associating environment group..."

            # Associate the group
            patch_response=$(curl -s -w "\n%{http_code}" -X PATCH \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"envVarsIncludeFromGroup\":[\"$RENDER_ENV_GROUP_ID\"]}")

            http_code=$(echo "$patch_response" | tail -n1)
            patch_body=$(echo "$patch_response" | sed '$d')

            echo "PATCH response (HTTP $http_code): $patch_body"

            if [[ "$http_code" =~ ^(200|201|204)$ ]]; then
              echo "✅ Association successful"
            else
              echo "❌ Association failed with HTTP $http_code"
              echo "Response: $patch_body"
              exit 1
            fi
          fi

      - name: Deploy to Render (Test)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY_TEST }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_TEST }}
        run: |
          set -e

          echo "=========================================="
          echo "🚀 Deploying to Render (TEST)"
          echo "Service ID: ${RENDER_SERVICE_ID:0:12}..."
          echo "=========================================="

          # Check for in-progress deploys and wait if needed
          echo "🔍 Checking for in-progress deploys..."
          max_wait_minutes=15
          waited=0

          while [ $waited -lt $((max_wait_minutes * 2)) ]; do
            current_deploy=$(curl -s \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" | jq -r '.[0] // empty')

            if [ -z "$current_deploy" ]; then
              echo "   No deploy history found"
              break
            fi

            current_status=$(echo "$current_deploy" | jq -r '.status')
            current_id=$(echo "$current_deploy" | jq -r '.id')

            if [[ "$current_status" =~ ^(live|succeeded|errored|failed|canceled)$ ]]; then
              echo "   Previous deploy ($current_id) is $current_status - ready to deploy"
              break
            else
              echo "   Deploy $current_id is $current_status - waiting..."
              sleep 30
              waited=$((waited + 1))
            fi
          done

          if [ $waited -ge $((max_wait_minutes * 2)) ]; then
            echo "⚠️  Timed out waiting for in-progress deploy to complete"
            echo "   You may need to cancel it manually in Render dashboard"
            exit 1
          fi

          # Now trigger new deploy
          echo "📤 Triggering new deploy..."
          trigger_response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json")

          http_status=$(echo "$trigger_response" | grep "HTTP_STATUS:" | cut -d: -f2)
          response_body=$(echo "$trigger_response" | sed '/HTTP_STATUS:/d')

          echo "📨 Response (HTTP $http_status):"
          echo "$response_body" | jq '.' 2>/dev/null || echo "$response_body"

          # Extract deploy ID safely
          deploy_id=$(echo "$response_body" | jq -r '.id // empty')
          if [ -z "$deploy_id" ]; then
            echo "❌ Failed to create deploy - no deploy ID in response"
            error_msg=$(echo "$response_body" | jq -r '.error // .message // empty')
            if [ -n "$error_msg" ]; then
              echo "   Error: $error_msg"
            fi
            echo "   Another deploy may still be running. Check Render dashboard."
            exit 1
          fi

          echo "✅ Deploy triggered: $deploy_id"
          echo "DEPLOY_ID=$deploy_id" >> $GITHUB_ENV

          echo "⏳ Waiting for deployment to complete..."

          for i in {1..60}; do
            echo "[$i/60] Checking status..."

            response=$(curl -s \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${deploy_id}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}")
            status=$(echo "$response" | jq -r '.status')

            case $status in
              live|succeeded)
                echo "✅ Deploy succeeded"
                service_url=$(echo "$response" | jq -r '.service.url // "N/A"')
                echo "🌐 Service URL: https://$service_url"
                break
                ;;
              errored|failed|canceled|build_failed)
                echo "❌ Deploy failed - status: $status"
                echo "Failure details:"
                echo "$response" | jq '.' 2>/dev/null
                exit 1
                ;;
              *)
                echo "   Current status: $status - waiting..."
                sleep 30
                ;;
            esac
          done

          # Final verification
          echo "🔍 Final verification..."
          final_response=$(curl -s \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${deploy_id}" \
            -H "Authorization: Bearer ${RENDER_API_KEY}")
          final_status=$(echo "$final_response" | jq -r '.status')

          if [ "$final_status" != "live" ] && [ "$final_status" != "succeeded" ]; then
            echo "❌ Deploy incomplete - final status: $final_status"
            echo "Response:"
            echo "$final_response" | jq '.' 2>/dev/null
            exit 1
          fi

          echo "=========================================="
          echo "✅ Deploy workflow completed successfully!"
          echo "=========================================="

      - name: Health Check (Test)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY_TEST }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID_TEST }}
        run: |
          echo "🏥 Performing health check (TEST)..."

          url=$(curl -s \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" | jq -r '.service.url')

          if [ -z "$url" ] || [ "$url" = "null" ]; then
            echo "❌ Could not retrieve service URL from Render API"
            exit 1
          fi

          echo "🌐 Service URL: https://$url"

          endpoints=(/health /api/auth/login)
          failed_endpoints=()

          for endpoint in "${endpoints[@]}"; do
            echo "  Checking $endpoint..."
            success=false

            for i in {1..30}; do
