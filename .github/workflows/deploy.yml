name: Deploy to Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Syntax check
        run: python -m py_compile src/backend/main.py

      - name: Lint (critical errors only)
        run: |
          flake8 src/backend/ --count --select=E9,F63,F7,F82 --isolated
        continue-on-error: false

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Associate Environment Group
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_ENV_GROUP_ID: ${{ secrets.RENDER_ENV_GROUP_ID }}
        run: |
          # Skip if RENDER_ENV_GROUP_ID is not set
          if [ -z "$RENDER_ENV_GROUP_ID" ]; then
            echo "ℹ️  RENDER_ENV_GROUP_ID not set, skipping environment group association"
            exit 0
          fi

          echo "Ensuring service is associated with environment group..."
          echo "Environment Group ID: ${RENDER_ENV_GROUP_ID:0:8}... (truncated for security)"

          # Get current service configuration
          response=$(curl -s \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" \
            -H "Authorization: Bearer ${RENDER_API_KEY}")

          # Check if group is already associated
          current_groups=$(echo "$response" | jq -r '.envVarsIncludeFromGroup // []')

          if echo "$current_groups" | grep -q "$RENDER_ENV_GROUP_ID"; then
            echo "✅ Environment group already associated"
          else
            echo "🔗 Associating environment group..."

            # Associate the group
            patch_response=$(curl -s -w "\n%{http_code}" -X PATCH \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"envVarsIncludeFromGroup\":[\"$RENDER_ENV_GROUP_ID\"]}")

            http_code=$(echo "$patch_response" | tail -n1)
            patch_body=$(echo "$patch_response" | sed '$d')

            echo "PATCH response (HTTP $http_code): $patch_body"

            if [[ "$http_code" =~ ^(200|201|204)$ ]]; then
              echo "✅ Association successful"
            else
              echo "❌ Association failed with HTTP $http_code"
              echo "Response: $patch_body"
              exit 1
            fi
          fi

      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -e  # Exit on any error
          set -x  # Echo commands for debugging

          echo "=========================================="
          echo "🚀 Triggering Render Deploy"
          echo "Service ID: ${RENDER_SERVICE_ID:0:12}..."
          echo "=========================================="

          # Trigger deploy with full response capture
          echo "📡 Sending deploy request..."
          trigger_response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json")

          http_status=$(echo "$trigger_response" | grep "HTTP_STATUS:" | cut -d: -f2)
          response_body=$(echo "$trigger_response" | sed '/HTTP_STATUS:/d')

          echo "📨 Trigger response (HTTP $http_status):"
          echo "$response_body" | jq '.' 2>/dev/null || echo "$response_body"

          deploy_id=$(echo "$response_body" | jq -r '.id')
          if [ -z "$deploy_id" ] || [ "$deploy_id" = "null" ]; then
            echo "❌ Failed to extract deploy ID"
            echo "Full raw response: $response_body"
            exit 1
          fi

          echo "✅ Deploy triggered successfully!"
          echo "📤 Deploy ID: $deploy_id"
          echo "DEPLOY_ID=$deploy_id" >> $GITHUB_ENV

          echo "⏳ Waiting for deployment to complete..."
          echo "   Checking every 30 seconds for up to 30 minutes..."

          for i in {1..60}; do
            echo -n "  Check $i/60... "

            response=$(curl -s \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${deploy_id}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}")
            status=$(echo "$response" | jq -r '.status')
            echo "Status: $status"

            case $status in
              live|succeeded)
                echo "✅ Deploy completed successfully!"
                service_url=$(echo "$response" | jq -r '.service.url // "N/A"')
                echo "🌐 Service URL: https://$service_url"
                break
                ;;
              errored|failed|canceled)
                echo "❌ Deploy failed with status: $status"
                echo "Full response:"
                echo "$response" | jq '.' 2>/dev/null || echo "$response"
                exit 1
                ;;
              *)
                sleep 30
                ;;
            esac
          done

          # Final verification
          echo "🔍 Final verification..."
          final_response=$(curl -s \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${deploy_id}" \
            -H "Authorization: Bearer ${RENDER_API_KEY}")
          final_status=$(echo "$final_response" | jq -r '.status')

          if [ "$final_status" != "live" ] && [ "$final_status" != "succeeded" ]; then
            echo "❌ Deploy did not complete successfully. Final status: $final_status"
            echo "Response:"
            echo "$final_response" | jq '.' 2>/dev/null || echo "$final_response"
            exit 1
          fi

          echo "=========================================="
          echo "✅ Deploy workflow completed successfully!"
          echo "=========================================="

      - name: Health Check
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -e

          echo "🏥 Performing health check..."

          url=$(curl -s \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" | jq -r '.service.url')

          if [ -z "$url" ] || [ "$url" = "null" ]; then
            echo "❌ Could not retrieve service URL from Render API"
            exit 1
          fi

          echo "🌐 Service URL: https://$url"

          endpoints=(/health /api/auth/login)
          failed_endpoints=()

          for endpoint in "${endpoints[@]}"; do
            echo -n "  Checking $endpoint... "
            success=false

            for i in {1..30}; do
              code=$(curl -s -o /dev/null -w "%{http_code}" "https://$url$endpoint" || echo "000")

              if [[ "$code" =~ ^(200|302)$ ]]; then
                echo "✅ OK (HTTP $code)"
                success=true
                break
              fi

              sleep 5
            done

            if [ "$success" = false ]; then
              echo "❌ FAILED after 30 attempts"
              failed_endpoints+=("$endpoint")
            fi
          done

          if [ ${#failed_endpoints[@]} -gt 0 ]; then
            echo "❌ Health check failed for endpoints: ${failed_endpoints[*]}"
            exit 1
          fi

          echo "✅ All health checks passed!"
