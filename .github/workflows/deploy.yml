name: PlayNexus CD (Deploy & Test)

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  workflow_dispatch:

jobs:
  deploy-and-test:
    name: ${{ contains(github.ref, 'refs/heads/main') && '🚀 Production' || '🧪 Staging/Test' }}
    runs-on: ubuntu-latest
    
    env:
      # Logic: 'main' -> production, everything else (develop, feature/*) -> test
      IS_PROD: ${{ contains(github.ref, 'refs/heads/main') }}
      APP_ENV: ${{ contains(github.ref, 'refs/heads/main') && 'production' || 'test' }}
      SITE_URL: ${{ contains(github.ref, 'refs/heads/main') && 'https://playnexus-prod.onrender.com' || 'https://playnexus-test.onrender.com' }}
      RENDER_HOOK: ${{ contains(github.ref, 'refs/heads/main') && secrets.RENDER_DEPLOY_HOOK_PROD || secrets.RENDER_DEPLOY_HOOK_TEST }}

    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Trigger Render Deployment
        # Skip Render deployment for feature branches, only deploy on main and develop
        if: env.RENDER_HOOK != '' && !startsWith(github.ref, 'refs/heads/feature/')
        run: |
          echo "Triggering deploy for ${{ github.ref_name }} to ${{ env.APP_ENV }}..."
          curl -s "${{ env.RENDER_HOOK }}" > /dev/null
          echo "✅ Deploy hook sent."

      - name: ⏳ Wait for Service (Optional Ping)
        run: |
          echo "Checking health of ${SITE_URL}/health..."
          # Quick check with 3 retries
          for i in {1..3}; do
            curl -sf "${SITE_URL}/health" && break || sleep 10
          done

      - name: 📦 Install Playwright
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: 🎬 Run Smoke Tests
        run: |
          echo "Running automated smoke tests against: ${SITE_URL}"
          SITE_URL="${SITE_URL}" node tests/smoke.test.js

      - name: 📸 Archive Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results-${{ github.ref_name }}
          path: screenshot.png
          retention-days: 7