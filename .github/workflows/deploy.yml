name: Deploy to Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Syntax check
        run: python -m py_compile src/backend/main.py

      - name: Lint (critical errors only)
        run: |
          flake8 src/backend/ --count --select=E9,F63,F7,F82 --isolated
        continue-on-error: false

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Associate Environment Group
        if: ${{ secrets.RENDER_ENV_GROUP_ID }}
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_ENV_GROUP_ID: ${{ secrets.RENDER_ENV_GROUP_ID }}
        run: |
          response=$(curl -s \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" \
            -H "Authorization: Bearer ${RENDER_API_KEY}")
          groups=$(echo "$response" | jq -r '.envVarsIncludeFromGroup // []')

          if ! echo "$groups" | grep -q "${RENDER_ENV_GROUP_ID}"; then
            echo "Associating environment group..."
            curl -s -X PATCH \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"envVarsIncludeFromGroup\":[\"${RENDER_ENV_GROUP_ID}\"]}" > /dev/null
          fi

      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          # Trigger deploy
          deploy_id=$(curl -s -X POST \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" | jq -r '.id')

          [ -n "$deploy_id" ] && [ "$deploy_id" != "null" ] || { echo "❌ Failed to trigger deploy"; exit 1; }
          echo "📤 Deploy $deploy_id triggered"

          # Wait for completion
          for i in {1..60}; do
            status=$(curl -s \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${deploy_id}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" | jq -r '.status')

            case $status in
              live|succeeded) echo "✅ Deploy succeeded"; break ;;
              errored|failed|canceled) echo "❌ Deploy $status"; exit 1 ;;
              *) printf '.'; sleep 30 ;;
            esac
          done

      - name: Health Check
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          url=$(curl -s \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" | jq -r '.service.url')

          [ -n "$url" ] && [ "$url" != "null" ] || { echo "❌ No service URL"; exit 1; }

          for endpoint in /health /api/auth/login; do
            for i in {1..30}; do
              code=$(curl -s -o /dev/null -w "%{http_code}" "$url$endpoint" || echo "000")
              if [[ "$code" =~ ^(200|302)$ ]]; then
                echo "✅ $endpoint -> $code"
                break
              fi
              sleep 5
            done
          done
