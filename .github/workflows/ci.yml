name: ✅ CI — Validate
run-name: "CI: ${{ github.event.head_commit.message || github.event.pull_request.title }}"

# ─────────────────────────────────────────────────────────────────
#  Triggers:
#  • PR targeting develop or main
#  • Push to develop or any feature/** branch
# ─────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ develop, 'feature/**' ]
  pull_request:
    branches: [ develop, main ]

# Fix for Node.js 20 deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Cancel stale runs on the same PR when new commits are pushed
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: ✅ Validate Files
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          clean: true          # Wipe workspace before checkout — fresh every run

      - name: 🔍 Check required files exist
        run: |
          echo "── Checking project files ──"
          test -f index.html    || (echo "❌ index.html missing!"   && exit 1)
          test -f css/style.css || (echo "❌ css/style.css missing!" && exit 1)
          test -f js/main.js    || (echo "❌ js/main.js missing!"   && exit 1)
          echo "✅ index.html    — OK"
          echo "✅ css/style.css — OK"
          echo "✅ js/main.js    — OK"
          echo "── All checks passed ──"

      - name: 🧹 Cleanup workspace
        if: always()           # Runs even if validation fails
        run: |
          echo "Cleaning up runner workspace..."
          rm -rf ${{ github.workspace }}/* || true
          echo "✅ Workspace cleaned"
