name: ✅ CI — Validate

# ─────────────────────────────────────────────────────────────────
#  Runs ONLY on Pull Requests targeting develop or main.
#  Will NEVER trigger on direct pushes to feature/*, develop, main.
#  Does NOT use any secrets or FTP credentials — purely a file check.
# ─────────────────────────────────────────────────────────────────
on:
  pull_request:
    branches: [ develop, main ]   # PRs to these branches only

# Cancel stale runs on the same PR when new commits are pushed
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: ✅ Validate Files
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          clean: true          # Wipe workspace before checkout — fresh every run

      - name: 🔍 Check required files exist
        run: |
          echo "── Checking project files ──"
          test -f index.html    || (echo "❌ index.html missing!"   && exit 1)
          test -f css/style.css || (echo "❌ css/style.css missing!" && exit 1)
          test -f js/main.js    || (echo "❌ js/main.js missing!"   && exit 1)
          echo "✅ index.html    — OK"
          echo "✅ css/style.css — OK"
          echo "✅ js/main.js    — OK"
          echo "── All checks passed ──"

      - name: 🧹 Cleanup workspace
        if: always()           # Runs even if validation fails
        run: |
          echo "Cleaning up runner workspace..."
          rm -rf ${{ github.workspace }}/* || true
          echo "✅ Workspace cleaned"
