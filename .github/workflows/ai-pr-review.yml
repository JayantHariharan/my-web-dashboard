name: AI PR Review (Optional)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    # Only run if PR meets criteria (size or label)
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && (
        (github.event.pull_request.additions + github.event.pull_request.deletions) > 200 ||
        contains(github.event.pull_request.labels.*.name, 'ai-review')
      ))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          # Get the diff between base and head
          git fetch origin ${{ github.event.pull_request.base.sha }}:${{ github.event.pull_request.base.sha }}
          git diff --unified=0 ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} > pr.diff
          echo "diff_path=pr.diff" >> $GITHUB_OUTPUT
          echo "Changed files:"
          git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}

      - name: Install dependencies
        run: |
          pip install anthropic python-dotenv

      - name: AI PR Review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || secrets.OPENROUTER_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL || 'anthropic/claude-3.5-sonnet' }}
        run: |
          echo "🤖 Running AI PR review..."

          python - <<'PY'
          import os, json, subprocess, sys
          from pathlib import Path

          diff_path = os.getenv('DIFF_PATH', 'pr.diff')
          pr_number = os.getenv('PR_NUMBER', '0')
          repo = os.getenv('GITHUB_REPOSITORY', '')

          # Read diff
          try:
              with open(diff_path) as f:
                  diff = f.read()
          except FileNotFoundError:
              print("❌ Diff file not found")
              sys.exit(1)

          # Truncate if too large (Claude has context limits)
          max_diff_size = 100000  # ~100KB
          if len(diff) > max_diff_size:
              print(f"⚠️ Diff too large ({len(diff)} bytes), truncating to {max_diff_size}")
              diff = diff[:max_diff_size] + "\n... [truncated]"

          # Prepare prompt
          prompt = f"""You are a senior code reviewer. Review this GitHub PR diff and provide constructive feedback.

Repository: {repo}
PR Number: #{pr_number}

Focus on:
1. Code quality & best practices
2. Potential bugs or security issues
3. Missing tests or documentation
4. Suggestions for improvement
5. Overall assessment: Should merge, needs changes, or needs more review?

Be concise but thorough. Use markdown formatting.

Diff:
```diff
{diff}
```

Provide your review in this format:
## Summary
[2-3 sentence summary]

## Key Findings
- ✅ Strengths
- ⚠️ Concerns (if any)
- 🔒 Security (if relevant)

## Recommendations
- Specific, actionable suggestions

## Final Verdict
[✅ Merge / ⏳ Changes needed / ❌ Do not merge / 🤔 More review needed]"""

          # Choose API based on available keys
          if os.getenv('ANTHROPIC_API_KEY'):
              print("Using Anthropic API...")
              try:
                  from anthropic import Anthropic
                  client = Anthropic(api_key=os.getenv('ANTHROPIC_API_KEY'))
                  response = client.messages.create(
                      model="claude-3-5-sonnet-20241022",
                      max_tokens=2000,
                      messages=[{"role": "user", "content": prompt}]
                  )
                  review = response.content[0].text
              except ImportError:
                  print("Anthropic SDK not installed, skipping...")
                  sys.exit(0)
              except Exception as e:
                  print(f"Anthropic API error: {e}")
                  sys.exit(0)
          elif os.getenv('OPENROUTER_API_KEY'):
              print("Using OpenRouter API...")
              import requests
              response = requests.post(
                  "https://openrouter.ai/api/v1/chat/completions",
                  headers={
                      "Authorization": f"Bearer {os.getenv('OPENROUTER_API_KEY')}",
                      "Content-Type": "application/json"
                  },
                  json={
                      "model": os.getenv('OPENROUTER_MODEL', 'anthropic/claude-3.5-sonnet'),
                      "messages": [{"role": "user", "content": prompt}],
                      "max_tokens": 2000
                  }
              )
              if response.status_code == 200:
                  review = response.json()['choices'][0]['message']['content']
              else:
                  print(f"OpenRouter error: {response.text}")
                  sys.exit(0)
          else:
              print("⚠️ No AI API key configured (ANTHROPIC_API_KEY or OPENROUTER_API_KEY)")
              print("AI PR review skipped. Add one of these secrets to enable.")
              sys.exit(0)

          print("✅ AI review generated")
          print(review)

          # Save review to file
          Path("ai-pr-review.md").write_text(review)
          print("review_path=ai-pr-review.md" >> os.getenv('GITHUB_OUTPUT'))

          # Post as PR comment
          if 'GITHUB_TOKEN' in os.environ:
              print("💬 Posting review as PR comment...")
              # Use GitHub CLI if available, otherwise use API
              try:
                  import requests
                  api_url = f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments"
                  headers = {
                      "Authorization": f"Bearer {os.getenv('GITHUB_TOKEN')}",
                      "Content-Type": "application/json"
                  }
                  comment = f"## 🤖 AI PR Review\n\n{review}\n\n---\n*Generated by CI - this is an automated review for your information. Human review still required.*"
                  resp = requests.post(api_url, headers=headers, json={"body": comment})
                  if resp.status_code in [200, 201]:
                      print("✅ Review posted!")
                  else:
                      print(f"⚠️ Failed to post: {resp.status_code} {resp.text}")
              except Exception as e:
                  print(f"⚠️ Could not post comment: {e}")
          PY
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIFF_PATH: ${{ steps.diff.outputs.diff_path }}

      - name: Upload AI review artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-pr-review
          path: ai-pr-review.md
          retention-days: 7

      - name: Post summary
        run: |
          echo "## 🤖 AI PR Review" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "ai-pr-review.md" ]; then
            cat ai-pr-review.md >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ AI review skipped (no API key or diff too large)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*This is an automated review to assist human reviewers. It may miss issues. Use your judgment.*" >> $GITHUB_STEP_SUMMARY
