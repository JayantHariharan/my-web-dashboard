name: Flyway Database Migrations

on:
  # This workflow is called by other workflows (deploy.yml)
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      PGHOST:
        required: true
      PGPORT:
        required: true
      PGUSER:
        required: true
      PGPASSWORD:
        required: true
      PGDATABASE:
        required: true

concurrency:
  group: flyway-${{ inputs.environment }}
  cancel-in-progress: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      success: ${{ steps.migrate.outputs.success }}
    env:
      PGHOST: ${{ secrets.PGHOST }}
      PGPORT: ${{ secrets.PGPORT }}
      PGUSER: ${{ secrets.PGUSER }}
      PGPASSWORD: ${{ secrets.PGPASSWORD }}
      PGDATABASE: ${{ secrets.PGDATABASE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Flyway
        uses: actions/cache@v4
        with:
          path: /opt/flyway
          key: ${{ runner.os }}-flyway-10.17.0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flyway (if not cached)
        run: |
          if [ ! -d "/opt/flyway" ]; then
            echo "📥 Downloading Flyway (cache miss)..."
            wget -q https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/10.17.0/flyway-commandline-10.17.0-linux-x64.tar.gz
            tar -xzf flyway-commandline-10.17.0-linux-x64.tar.gz
            sudo mv flyway-10.17.0 /opt/flyway
          fi
          echo "/opt/flyway" >> $GITHUB_PATH

      - name: Validate database configuration
        run: |
          if [ -z "$PGHOST" ] || [ -z "$PGPORT" ] || [ -z "$PGUSER" ] || [ -z "$PGPASSWORD" ] || [ -z "$PGDATABASE" ]; then
            echo "❌ ERROR: PostgreSQL environment variables not set"
            echo "Required secrets: PGHOST, PGPORT, PGUSER, PGPASSWORD, PGDATABASE"
            exit 1
          fi
          echo "✅ Database configuration validated"
          echo "   Host: $PGHOST"
          echo "   Port: $PGPORT"
          echo "   Database: $PGDATABASE"
          echo "   User: $PGUSER"
          echo "   Environment: ${{ inputs.environment }}"

      - name: Run Flyway migrations
        id: migrate
        run: |
          set -e

          echo "🚀 Running Flyway database migrations..."

          # Build JDBC URL from parts (Supabase requires SSL)
          DATABASE_URL="jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=require"

          # Determine table suffix based on environment (matches app logic)
          if [ "${{ inputs.environment }}" = "production" ]; then
            TABLE_SUFFIX="_prod"
          else
            TABLE_SUFFIX="_test"
          fi

          echo "Environment: ${{ inputs.environment }}"
          echo "Table suffix: $TABLE_SUFFIX"
          echo "Schema history table: schema_version$TABLE_SUFFIX"
          echo "Database URL: $DATABASE_URL"

          # Display configuration
          flyway -configFiles=flyway/conf/flyway.conf info || true

          # Run migrations with table suffix placeholder and custom schema history table
          if flyway -configFiles=flyway/conf/flyway.conf \
            -url="$DATABASE_URL" \
            -user="$PGUSER" \
            -password="$PGPASSWORD" \
            -placeholders.table_suffix="$TABLE_SUFFIX" \
            -table="schema_version$TABLE_SUFFIX" \
            migrate; then
            echo "✅ Flyway migrations completed successfully"
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Flyway migrations failed"
            echo "success=false" >> $GITHUB_OUTPUT
            exit 1
          fi
