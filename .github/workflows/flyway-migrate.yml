name: Database Migrations (Python)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      PGHOST:
        required: true
      PGPORT:
        required: true
      PGUSER:
        required: true
      PGPASSWORD:
        required: true
      PGDATABASE:
        required: true
      DATABASE_URL:
        required: true

concurrency:
  group: migrate-${{ inputs.environment }}
  cancel-in-progress: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      success: ${{ steps.migrate.outputs.success }}

    env:
      PGHOST: ${{ secrets.PGHOST }}
      PGPORT: ${{ secrets.PGPORT }}
      PGUSER: ${{ secrets.PGUSER }}
      PGPASSWORD: ${{ secrets.PGPASSWORD }}
      PGDATABASE: ${{ secrets.PGDATABASE }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ENV: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet psycopg2-binary pyyaml python-dotenv

      - name: Validate database configuration
        run: |
          # Support both PG* secrets and DATABASE_URL
          if [ -n "$DATABASE_URL" ]; then
            echo "✅ Using DATABASE_URL from secrets"
            echo "   URL: ${DATABASE_URL:0:50}...(truncated)"
          elif [ -z "$PGHOST" ] || [ -z "$PGPORT" ] || [ -z "$PGUSER" ] || [ -z "$PGPASSWORD" ] || [ -z "$PGDATABASE" ]; then
            echo "❌ ERROR: PostgreSQL configuration incomplete"
            echo "Required either:"
            echo "  - DATABASE_URL (full connection string)"
            echo "  - Or individual secrets: PGHOST, PGPORT, PGUSER, PGPASSWORD, PGDATABASE"
            exit 1
          else
            echo "✅ Database configuration validated (using PG* secrets)"
            echo "   Host: $PGHOST"
            echo "   Port: $PGPORT"
            echo "   Database: $PGDATABASE"
            echo "   User: $PGUSER"
          fi
          echo "   Environment: ${{ inputs.environment }}"

          # Test network connectivity to the database host
          DB_HOST="${PGHOST:-$(echo $DATABASE_URL | sed -n 's|.*://\([^:/]*\).*|\1|p')}"
          DB_PORT="${PGPORT:-$(echo $DATABASE_URL | sed -n 's|.*:\([0-9]*\)/.*|\1|p')}"
          if [ -z "$DB_PORT" ]; then DB_PORT=5432; fi

          echo ""
          echo "🔍 Testing network connectivity to $DB_HOST:$DB_PORT..."
          if command -v nc &> /dev/null; then
            if timeout 10 nc -z $DB_HOST $DB_PORT; then
              echo "✅ Network connection successful"
            else
              echo "❌ Cannot reach database host/port"
              echo "   This likely means Supabase is blocking this IP."
              echo "   Solution: Add GitHub Actions IPs to Supabase allowlist."
              echo "   See: https://supabase.com/docs/guides/database/connecting-to-database#ip-allowlist"
            fi
          elif command -v curl &> /dev/null; then
            if curl --connect-timeout 10 "https://${DB_HOST}" > /dev/null 2>&1; then
              echo "✅ Host reachable via HTTPS"
            else
              echo "❌ Host not reachable"
            fi
          else
            echo "⚠️  Cannot test connectivity (nc/curl not available)"
          fi

      - name: Run Python migrations
        id: migrate
        run: |
          set -e

          echo "🚀 Running Python database migrations..."

          # Determine table suffix based on environment (matches app logic)
          if [ "${{ inputs.environment }}" = "production" ]; then
            TABLE_SUFFIX="_prod"
          else
            TABLE_SUFFIX="_test"
          fi

          echo "Environment: ${{ inputs.environment }}"
          echo "Table suffix: $TABLE_SUFFIX"

          # Show migration plan first
          echo ""
          echo "📋 Available migrations:"
          python scripts/migrate.py --list || true

          # Run migrations with retry logic
          echo ""
          echo "🔄 Attempting migrations (max 3 retries)..."
          max_attempts=3
          attempt=1
          success=false

          while [ $attempt -le $max_attempts ]; do
            echo "Attempt $attempt of $max_attempts..."
            if python scripts/migrate.py; then
              echo "✅ Migrations completed successfully on attempt $attempt"
              success=true
              break
            else
              echo "❌ Attempt $attempt failed"
              if [ $attempt -lt $max_attempts ]; then
                echo "⏳ Waiting 10 seconds before retry..."
                sleep 10
              fi
            fi
            attempt=$((attempt + 1))
          done

          if [ "$success" = true ]; then
            echo "success=true" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "❌ Migrations failed after $max_attempts attempts"
            echo "success=false" >> $GITHUB_OUTPUT
            exit 1
          fi
