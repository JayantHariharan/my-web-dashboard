name: Quality Checks

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run repository quality checks
        run: bash ./scripts/run-quality-checks.sh
