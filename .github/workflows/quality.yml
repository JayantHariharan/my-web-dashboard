name: Quality & Security Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    concurrency:
      group: quality-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install flake8 mypy black bandit anthropic openai

      - name: Python syntax check
        run: python -m py_compile src/backend/main.py

      - name: Lint with flake8 (critical errors)
        run: |
          flake8 src/backend/ --count --select=E9,F63,F7,F82 --show-source --statistics --output-file=flake8-report.txt

      - name: Upload flake8 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake8-report
          path: flake8-report.txt
          retention-days: 7

      - name: Type check with mypy
        run: |
          mypy src/backend/main.py --ignore-missing-imports --show-error-codes 2>&1 | tee mypy-report.txt

      - name: Upload mypy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-report
          path: mypy-report.txt
          retention-days: 7

      - name: Format check with black
        run: |
          black --check src/backend/

      - name: Security scan with bandit
        run: |
          bandit -r src/backend/ -f json -o bandit-report.json || true

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 7

      - name: Claude Security Analysis
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL || 'meta-llama/llama-3.3-70b-instruct' }}
        run: |
          # Check if OPENROUTER_API_KEY is set (non-empty)
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "⚠️  OPENROUTER_API_KEY is not set - skipping Claude security analysis"
            echo "report_path=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "🔍 Running AI-powered security analysis via OpenRouter..."

          python .github/scripts/claude_security_scan.py

          if [ -f "claude-security-report.json" ]; then
            echo "📊 Security report generated:"
            cat claude-security-report.json | python -m json.tool

            # Upload report as artifact
            echo "report_path=claude-security-report.json" >> $GITHUB_OUTPUT
          else
            echo "⚠️  No security report generated"
            echo "report_path=" >> $GITHUB_OUTPUT
          fi
        id: claude-scan

      - name: Upload Claude security report
        if: always() && steps.claude-scan.outputs.report_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: claude-security-report
          path: ${{ steps.claude-scan.outputs.report_path }}
          retention-days: 7

      - name: Security summary
        if: always()
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python - <<'PY'
          import json, sys, os
          summary_md = ""

          # Bandit
          try:
              with open('bandit-report.json') as f:
                  bandit = json.load(f)
              # Bandit severities: LOW, MEDIUM, HIGH. Count Medium+ issues.
              medium_plus = [i for i in bandit if i.get('issue_severity') in ('MEDIUM', 'HIGH')]
              summary_md += f"**Bandit Issues (Medium+):** {len(medium_plus)}\n"
          except FileNotFoundError:
              summary_md += "**Bandit Issues:** Not generated\n"
          except Exception as e:
              summary_md += f"**Bandit Issues:** Error reading report ({e})\n"

          # Claude
          try:
              with open('claude-security-report.json') as f:
                  claude = json.load(f)
              s = claude.get('summary', {})
              total = s.get('total_issues', 0)
              by_sev = s.get('by_severity', {})
              crit = by_sev.get('Critical', 0)
              high = by_sev.get('High', 0)
              summary_md += f"**Claude Security Issues:** Total: {total} | Critical: {crit} | High: {high}\n"
          except FileNotFoundError:
              summary_md += "**Claude Security Issues:** Skipped (no security API key set)\n"
          except Exception as e:
              summary_md += f"**Claude Security Issues:** Error reading report ({e})\n"

          summary_md += "\nSee artifacts for detailed reports.\n"
          print(summary_md)
          summary_file = os.getenv('GITHUB_STEP_SUMMARY')
          if summary_file:
              with open(summary_file, 'a') as f:
                  f.write(summary_md)
          PY

      - name: Check for blocking security issues
        if: always()
        run: |
          python - <<'PY'
          import json, sys
          fail = 0

          # Check bandit for high/critical
          try:
              with open('bandit-report.json') as f:
                  bandit = json.load(f)
              high_critical = [i for i in bandit if i.get('issue_severity') in ('HIGH', 'CRITICAL')]
              if len(high_critical) > 0:
                  print(f"❌ Found {len(high_critical)} High/Critical issues in bandit scan")
                  fail = 1
          except FileNotFoundError:
              pass
          except Exception as e:
              print(f"⚠️  Error reading bandit report: {e}")

          # Check Claude for critical/high
          try:
              with open('claude-security-report.json') as f:
                  claude = json.load(f)
              by_sev = claude.get('summary', {}).get('by_severity', {})
              critical = by_sev.get('Critical', 0)
              high = by_sev.get('High', 0)
              if critical > 0 or high > 0:
                  print(f"❌ Claude found {critical} Critical and {high} High severity issues")
                  fail = 1
          except FileNotFoundError:
              pass
          except Exception as e:
              print(f"⚠️  Error reading Claude report: {e}")

          if fail:
              print("❌ Security quality checks failed. Review reports and fix issues.")
              sys.exit(1)
          else:
              print("✅ Security quality checks passed")
          PY
