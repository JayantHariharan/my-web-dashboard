name: AI-Powered Quality & Security Checks

on:
  pull_request:
    branches: [main, develop]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    concurrency:
      group: quality-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install openai

      - name: Python syntax check
        run: python -m py_compile src/backend/main.py

      - name: AI-Powered Comprehensive Quality Scan
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL || 'anthropic/claude-3-opus' }}
        run: |
          echo "🚀 Running AI-powered comprehensive code quality scan..."
          echo "   (replaces flake8, mypy, black, bandit in a single analysis)"

          python .github/scripts/ai_quality_scan.py

          if [ -f "ai-quality-report.json" ]; then
            echo "📊 Quality report generated:"
            cat ai-quality-report.json | python -m json.tool

            # Upload report as artifact
            echo "report_path=ai-quality-report.json" >> $GITHUB_OUTPUT
          else
            echo "⚠️  No quality report generated"
            echo "report_path=" >> $GITHUB_OUTPUT
            exit 1
          fi
        id: ai-scan

      - name: Upload AI quality report
        if: always() && steps.ai-scan.outputs.report_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: ai-quality-report
          path: ${{ steps.ai-scan.outputs.report_path }}
          retention-days: 7

      - name: Quality Summary
        if: always()
        run: |
          echo "## 🤖 AI Code Quality Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python - <<'PY'
          import json, sys, os
          summary_md = ""

          try:
              with open('ai-quality-report.json') as f:
                  report = json.load(f)

              stats = report.get("statistics", {})
              summary = report.get("summary", {})

              summary_md += "### Scan Overview\n"
              summary_md += f"- **Files scanned:** {summary.get('files_scanned', stats.get('files_with_issues', 0))}\n"
              summary_md += f"- **Total lines:** {stats.get('total_lines', 'N/A')}\n"
              summary_md += f"- **Functions with docstrings:** {stats.get('functions_with_docstrings', 0)}\n"
              summary_md += f"- **Type-annotated functions:** {stats.get('type_annotated_functions', 0)}\n\n"

              summary_md += "### Issues by Severity\n"
              for severity in ["Critical", "High", "Medium", "Low", "Info"]:
                  count = summary.get("by_severity", {}).get(severity, 0)
                  if count > 0:
                      emoji = "🔴" if severity in ["Critical", "High"] else "🟡" if severity == "Medium" else "🟢"
                      summary_md += f"- {emoji} **{severity}:** {count}\n"

              summary_md += "\n### Issues by Category\n"
              categories = summary.get("by_category", {})
              for category, count in categories.items():
                  if count > 0:
                      emoji = {
                          "security": "🔒",
                          "bug": "🐛",
                          "quality": "📐",
                          "style": "💅",
                          "type": "🏷️",
                          "formatting": "✨"
                      }.get(category, "•")
                      summary_md += f"- {emoji} **{category}:** {count}\n"

              # Show blocking status
              if summary.get("has_blocking_issues"):
                  summary_md += "\n⚠️ **Blocking Issues Detected** (Critical/High severity or Medium+ security)\n"
              else:
                  summary_md += "\n✅ **No blocking issues found**\n"

          except FileNotFoundError:
              summary_md += "⚠️ Quality report not found\n"
          except Exception as e:
              summary_md += f"⚠️ Error reading report: {e}\n"

          summary_md += "\n---\n*Generated by AI Code Quality Scanner*\n"
          print(summary_md)
          summary_file = os.getenv('GITHUB_STEP_SUMMARY')
          if summary_file:
              with open(summary_file, 'a') as f:
                  f.write(summary_md)
          PY

      - name: Check for blocking quality issues
        if: always()
        run: |
          python - <<'PY'
          import json, sys

          try:
              with open('ai-quality-report.json') as f:
                  report = json.load(f)

              summary = report.get("summary", {})
              fail = 0

              # Critical or High severity issues are blocking
              critical = summary.get("by_severity", {}).get("Critical", 0)
              high = summary.get("by_severity", {}).get("High", 0)

              if critical > 0 or high > 0:
                  print(f"❌ Found {critical} Critical and {high} High severity issues")
                  fail = 1

              # Medium+ security issues are blocking
              medium_security = 0
              for issue in report.get("issues", []):
                  if issue.get("category") == "security" and issue.get("severity") in ["Medium", "High", "Critical"]:
                      medium_security += 1

              if medium_security > 0:
                  print(f"❌ Found {medium_security} Medium+ severity security issues")
                  fail = 1

              if fail:
                  print("\n❌ Quality checks failed. Review the AI quality report for details.")
                  print("   Top issues to fix:")
                  issues = sorted(
                      report.get("issues", []),
                      key=lambda x: {"Critical": 4, "High": 3, "Medium": 2, "Low": 1, "Info": 0}.get(x.get("severity"), 0),
                      reverse=True
                  )[:5]
                  for issue in issues:
                      print(f"   - {issue['file']}:{issue['line']} - {issue['title']}")
                  sys.exit(1)
              else:
                  print("✅ All quality checks passed!")
                  sys.exit(0)

          except FileNotFoundError:
              print("❌ Quality report not found")
              sys.exit(1)
          except Exception as e:
              print(f"⚠️ Error reading quality report: {e}")
              sys.exit(1)
          PY
