name: Code Quality Checks

on:
  pull_request:
    branches: [main, develop]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    concurrency:
      group: quality-syntax-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if PR is up-to-date with base branch
        run: |
          echo "🔍 Checking if this PR is up-to-date with ${{ github.base_ref }}..."
          git fetch origin ${{ github.base_ref }}
          if git merge-base --is-ancestor origin/${{ github.base_ref }} HEAD 2>/dev/null; then
            echo "✅ PR is up-to-date with ${{ github.base_ref }}"
          else
            echo "❌ PR is OUT OF DATE with ${{ github.base_ref }}"
            echo ""
            echo "Your branch has commits not in ${{ github.base_ref }}:"
            git log --oneline origin/${{ github.base_ref }}..HEAD
            echo ""
            echo "⚠️  This PR cannot be merged until you rebase onto ${{ github.base_ref }}"
            echo ""
            echo "To fix this locally:"
            echo "  git fetch origin"
            echo "  git rebase origin/${{ github.base_ref }}"
            echo ""
            exit 1
          fi

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .venv
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python syntax check
        run: |
          python -m py_compile src/backend/main.py 2>&1 | tee quality-syntax.log

      - name: YAML syntax validation
        run: |
          echo "Validating workflow YAML files..."
          for wf in .github/workflows/*.yml; do
            echo "Checking: $wf"
            python -c "import yaml; yaml.safe_load(open('$wf', encoding='utf-8'))" 2>&1 | tee -a quality-yaml.log || true
          done
        continue-on-error: false

      - name: Check import ordering (basic)
        run: |
          echo "Checking for import order issues..."
          if grep -n "^import" src/backend/main.py | head -1 | grep -q "^[0-9]*:import"; then
            echo "✅ Imports appear at top of file" | tee quality-imports.log
          else
            echo "⚠️  Check import ordering" | tee quality-imports.log
          fi

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports-${{ github.sha }}
          path: |
            quality-*.log
          retention-days: 7
