<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Nexus | PlayNexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/crystal-portal.css">
    <link rel="stylesheet" href="../css/site-chrome.css">
    <style>
        .community-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--crystal-border);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }
        .community-card:hover { background: rgba(255,255,255,0.06); border-color: var(--nexus-purple); transform: translateY(-10px); }
    </style>
</head>
<body class="dark-theme site-with-chrome" data-root-prefix=".." data-chrome-active="community" data-chrome-pill="Community" style="min-height: 100vh; display: flex; flex-direction: column;">

    <script>
        (function requirePlayNexusSession() {
            var key = 'playnexus_session';
            var raw = sessionStorage.getItem(key) || localStorage.getItem(key);
            var legacy = sessionStorage.getItem('playnexus_user') || localStorage.getItem('playnexus_user');
            if (!raw && !legacy) {
                window.location.replace('../index.html');
            }
        })();
    </script>

    <div id="site-chrome-header"></div>

    <main style="max-width: 1200px; margin: 0 auto; padding: 28px 5% 60px; flex: 1;">
        <h1 class="row-title" style="text-align: center;">Join the exploration</h1>
        <p style="text-align: center; color: rgba(255,255,255,0.45); margin-bottom: 48px; font-family: 'Outfit', sans-serif;">Bridge the gap between builders and players—swap in your real repo and chat links below.</p>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 28px;">
            <div class="community-card" onclick="window.open('https://github.com/your-username/your-repo/issues', '_blank')">
                <div style="font-size: 3rem; margin-bottom: 20px;">🏗️</div>
                <h3>Report a bug</h3>
                <p style="color: #888;">Direct bridge to your issue tracker.</p>
            </div>

            <div class="community-card" onclick="window.open('https://github.com/your-username/your-repo/discussions', '_blank')">
                <div style="font-size: 3rem; margin-bottom: 20px;">💡</div>
                <h3>Request a feature</h3>
                <p style="color: #888;">Propose new nodes for the Nexus.</p>
            </div>

            <div class="community-card">
                <div style="font-size: 3rem; margin-bottom: 20px;">🛰️</div>
                <h3>Discord / chat</h3>
                <p style="color: #888;">Add your invite link in this card when ready.</p>
            </div>
        </div>
    </main>

    <div id="site-chrome-footer"></div>
    <script src="../js/site-chrome.js"></script>
</body>
</html>
