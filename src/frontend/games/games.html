<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Center | PlayNexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/crystal-portal.css">
    <link rel="stylesheet" href="../css/site-chrome.css">
    <style>
        /* 🕹️ Epic Store Showcase Styles */
        body { overflow-x: hidden; }

        .store-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5% 100px;
        }

        /* 🔍 Search Hub */
        .search-container {
            margin: 20px 0 40px;
        }
        
        .search-hub {
            width: 100%;
            max-width: 600px;
            padding: 16px 25px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            color: #fff;
            font-family: 'Outfit';
            font-size: 1rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .search-hub:focus {
            outline: none;
            background: rgba(255,255,255,0.08);
            border-color: var(--nexus-purple);
            box-shadow: 0 0 20px rgba(187, 134, 252, 0.2);
        }

        /* 🎬 Epic Hero Section */
        .epic-hero {
            position: relative;
            width: 100%;
            height: 500px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 60px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            transition: background-image 0.5s ease-in-out;
        }

        .epic-hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
        }

        .epic-hero-content {
            position: relative;
            z-index: 2;
            padding: 60px;
            max-width: 600px;
        }

        .hero-logo-text {
            font-weight: 900;
            font-size: 4rem;
            line-height: 1;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-family: 'Outfit';
            background: linear-gradient(135deg, #fff, #bbb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            transition: opacity 0.3s;
        }

        .epic-btn-yellow {
            background: #f1c40f;
            color: #000;
            font-family: 'Outfit';
            font-weight: 900;
            font-size: 0.9rem;
            padding: 14px 30px;
            border-radius: 8px;
            border: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 25px;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
        }

        .epic-btn-yellow:hover { transform: scale(1.05); }
        .epic-btn-yellow.disabled { 
            background: rgba(255,255,255,0.1); 
            color: rgba(255,255,255,0.5); 
            cursor: not-allowed; 
        }
        .epic-btn-yellow.disabled:hover { transform: none; }

        /* 📺 Row Title */
        .store-section-title {
            font-family: 'Outfit';
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 25px;
            color: #fff;
        }

        .epic-strip {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        .epic-cover-card {
            aspect-ratio: 3/4;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            background-size: cover;
            background-position: center;
        }

        .epic-cover-card:hover { transform: translateY(-8px); }
        .epic-cover-card.disabled { cursor: not-allowed; pointer-events: none; }
        .epic-cover-card.disabled:hover { transform: none; }

        .epic-cover-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 50%);
            display: flex;
            align-items: flex-end;
            padding: 20px;
        }

        .epic-cover-title {
            font-family: 'Outfit';
            font-weight: 800;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
        }

        .epic-cover-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255,255,255,0.9);
            color: #000;
            font-size: 0.6rem;
            font-weight: 900;
            padding: 4px 8px;
            border-radius: 4px;
        }

        /* 🔘 Modal Styles */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .game-modal {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--nexus-purple);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 0 50px rgba(187, 134, 252, 0.2);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }
        .modal-overlay.active .game-modal {
            transform: translateY(0);
        }
        .mode-btn {
            display: block;
            width: 100%;
            padding: 20px;
            margin: 15px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-family: 'Outfit';
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .mode-btn:hover {
            background: rgba(187, 134, 252, 0.2);
            border-color: var(--nexus-purple);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(187, 134, 252, 0.15);
        }

        @media (max-width: 800px) {
            .epic-hero { height: 350px; }
            .hero-logo-text { font-size: 2.5rem; }
            .epic-hero-content { padding: 30px; }
            .epic-strip { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        }

        @media (max-width: 500px) {
            .epic-hero { height: 280px; }
            .hero-logo-text { font-size: 1.8rem; }
            .epic-btn-yellow { padding: 10px 20px; font-size: 0.75rem; }
            .store-container { padding-bottom: 50px; }
        }
    </style>
</head>
<body class="dark-theme site-with-chrome" data-root-prefix=".." data-chrome-active="games" data-chrome-pill="🎮 Play Center" style="min-height: 100vh; display: flex; flex-direction: column;">

    <script>
        (function requirePlayNexusSession() {
            var key = 'playnexus_session';
            var raw = sessionStorage.getItem(key) || localStorage.getItem(key);
            var legacy = sessionStorage.getItem('playnexus_user') || localStorage.getItem('playnexus_user');
            if (!raw && !legacy) {
                window.location.replace('../index.html');
            }
        })();
    </script>

    <div id="site-chrome-header"></div>

    <div class="store-container" style="flex: 1;">
        
        <!-- 🔍 Epic Store Search -->
        <div class="search-container">
            <input type="text" class="search-hub" placeholder="🔍 Search store...">
        </div>

        <!-- 🎬 Epic Fortnite-Style Hero Carousel -->
        <div class="epic-hero" id="hero-banner" style="background-image: url('../assets/tictactoe-cover.png'); background-size: cover; background-position: center;">
            <div class="epic-hero-overlay"></div>
            
            <!-- Hero Carousel Arrows -->
            <div style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); font-size: 2.5rem; color: rgba(255,255,255,0.4); cursor: pointer; z-index: 10; padding: 20px;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.4)'" onclick="prevSlide()">❮</div>
            <div style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 2.5rem; color: rgba(255,255,255,0.4); cursor: pointer; z-index: 10; padding: 20px;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.4)'" onclick="nextSlide()">❯</div>

            <div class="epic-hero-content">
                <div class="hero-logo-text" id="hero-title">TIC-TAC-TOE CRYSTAL</div>
                <h3 id="hero-tagline" style="font-family: 'Outfit'; font-size: 1.2rem; color: #f1c40f; margin-bottom: 10px;">The Nexus Agent AI is waiting.</h3>
                <button class="epic-btn-yellow" id="hero-play-btn" onclick="triggerPlay()">ENTER ARENA</button>
            </div>

            <!-- Pagination Dots -->
            <div style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px;" id="hero-dots">
                <div class="dot active" style="width: 30px; height: 4px; background: #fff; border-radius: 2px; transition: 0.3s;"></div>
                <div class="dot inactive" style="width: 10px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; transition: 0.3s;"></div>
            </div>
        </div>

        <!-- 📺 All Available Games Row -->
        <h2 class="store-section-title">PlayNexus Library</h2>
        <div class="epic-strip">
            <!-- Tic-Tac-Toe Crystal (Playable) -->
            <div class="epic-cover-card" onclick="openModal()" style="background-image: url('../assets/tictactoe-cover.png'); background-size: cover; background-position: center; border: 2px solid var(--nexus-purple);">
                <span class="epic-cover-badge" style="background: var(--nexus-cyan); color: #000;">FEATURED</span>
                <div class="epic-cover-overlay">
                    <div class="epic-cover-title">Tic-Tac-Toe Crystal</div>
                </div>
            </div>

            <!-- Future Game Placeholder -->
            <div class="epic-cover-card disabled" style="background-image: url('../assets/coming-soon-cover.png'); background-size: cover; background-position: center; border: 1px solid rgba(255,255,255,0.1);">
                <span class="epic-cover-badge">IN DEVELOPMENT</span>
                <div class="epic-cover-overlay" style="background: rgba(0,0,0,0.6);">
                    <div class="epic-cover-title" style="color: #888;">Project Nebula</div>
                </div>
            </div>
        </div>

    </div>

    <div id="site-chrome-footer"></div>

    <!-- 🔘 Game Mode Selector Modal -->
    <div class="modal-overlay" id="mode-modal" onclick="closeModal(event)">
        <div class="game-modal" onclick="event.stopPropagation()">
            <h2 style="font-family: 'Outfit'; color: #fff; margin-bottom: 5px; font-size: 2rem;">SELECT MODE</h2>
            <p style="color: #888; margin-bottom: 30px; font-size: 0.9rem;">Choose your challenge for Tic-Tac-Toe Crystal.</p>
            
            <button class="mode-btn" onclick="location.href='tic-tac-toe.html?mode=single'">👤 SINGLE-PLAYER <span style="font-size: 0.8rem; color: #888; font-weight: normal;">(vs Agent AI)</span></button>
            <button class="mode-btn" onclick="location.href='tic-tac-toe.html?mode=multi'">👥 LOCAL MULTIPLAYER</button>
            
            <div style="margin-top: 25px; color: #666; font-size: 0.8rem; font-weight: bold; cursor: pointer; letter-spacing: 1px;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#666'" onclick="closeModal(null, true)">CANCEL LAUNCH</div>
        </div>
    </div>

    <!-- Carousel Logic -->
    <!-- JS Logic -->
    <script src="../js/site-chrome.js"></script>
    <script src="../js/toast.js"></script>
    <script>
        // Hero Carousel Logic
        const slides = [
            {
                title: "TIC-TAC-TOE CRYSTAL",
                tagline: "The Nexus Agent AI is waiting.",
                bg: "../assets/tictactoe-cover.png",
                btnText: "ENTER ARENA",
                playable: true
            },
            {
                title: "PROJECT NEBULA",
                tagline: "Explore the vast uncharted galaxy.",
                bg: "../assets/coming-soon-cover.png",
                btnText: "SYSTEM CLASSIFIED",
                playable: false
            }
        ];

        let currentIndex = 0;
        let slideInterval;

        const banner = document.getElementById('hero-banner');
        const title = document.getElementById('hero-title');
        const tagline = document.getElementById('hero-tagline');
        const playBtn = document.getElementById('hero-play-btn');
        const dots = document.querySelectorAll('#hero-dots .dot');

        function updateSlide() {
            const slide = slides[currentIndex];
            
            // Fade Text out
            title.style.opacity = 0;
            tagline.style.opacity = 0;
            playBtn.style.opacity = 0;

            setTimeout(() => {
                banner.style.backgroundImage = `url('${slide.bg}')`;
                title.innerText = slide.title;
                tagline.innerText = slide.tagline;
                playBtn.innerText = slide.btnText;

                if (slide.playable) {
                    playBtn.classList.remove('disabled');
                    playBtn.classList.add('epic-btn-yellow');
                    playBtn.style.background = '#f1c40f'; // Original yellow
                    playBtn.style.color = '#000';
                } else {
                    playBtn.classList.add('disabled');
                    playBtn.classList.remove('epic-btn-yellow');
                    playBtn.style.background = 'rgba(255,255,255,0.1)';
                    playBtn.style.color = '#888';
                }

                // Fade In
                title.style.opacity = 1;
                tagline.style.opacity = 1;
                playBtn.style.opacity = 1;
            }, 300);

            // Update dots
            dots.forEach((dot, index) => {
                if(index === currentIndex) {
                    dot.style.width = '30px';
                    dot.style.background = '#fff';
                } else {
                    dot.style.width = '10px';
                    dot.style.background = 'rgba(255,255,255,0.3)';
                }
            });
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % slides.length;
            updateSlide();
            resetInterval();
        }

        function prevSlide() {
            currentIndex = (currentIndex - 1 + slides.length) % slides.length;
            updateSlide();
            resetInterval();
        }

        function resetInterval() {
            clearInterval(slideInterval);
            slideInterval = setInterval(nextSlide, 5000);
        }

        // Init Carousel
        resetInterval();

        banner.addEventListener('mouseenter', () => clearInterval(slideInterval));
        banner.addEventListener('mouseleave', () => resetInterval());

        function triggerPlay() {
            if (slides[currentIndex].playable) {
                openModal();
            }
        }

        // Modal Logic
        const modal = document.getElementById('mode-modal');
        function openModal() {
            modal.classList.add('active');
        }
        function closeModal(e, force = false) {
            if (force || e.target === modal) {
                modal.classList.remove('active');
            }
        }

        // 🔍 Live Search Filter for Games
        const searchInput = document.querySelector('.search-hub');
        const gameCards = document.querySelectorAll('.epic-cover-card');

        if (searchInput) {
            searchInput.addEventListener('input', debounce(function(e) {
                const query = e.target.value.toLowerCase().trim();
                let hasVisible = false;

                gameCards.forEach(card => {
                    const title = card.querySelector('.epic-cover-title')?.textContent.toLowerCase() || '';
                    const isDisabled = card.classList.contains('disabled');
                    const isMatch = title.includes(query);

                    if (query === '' || (isMatch && !isDisabled)) {
                        card.style.display = '';
                        hasVisible = true;
                    } else {
                        card.style.display = 'none';
                    }
                });

                // Show "no results" message if needed
                const strip = document.querySelector('.epic-strip');
                let noResultsMsg = strip.querySelector('.no-results-message');
                if (!hasVisible && query !== '') {
                    if (!noResultsMsg) {
                        noResultsMsg = document.createElement('p');
                        noResultsMsg.className = 'no-results-message';
                        noResultsMsg.textContent = 'No games found matching your search.';
                        noResultsMsg.style = 'text-align:center; padding:20px; color:#888; font-family:"Outfit";';
                        strip.appendChild(noResultsMsg);
                    }
                } else if (noResultsMsg) {
                    noResultsMsg.remove();
                }
            }, 300));
        }

        // Debounce utility
        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }
    </script>
</body>
</html>
