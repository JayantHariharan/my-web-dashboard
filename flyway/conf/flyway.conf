# Flyway Configuration
# This file is used by GitHub Actions and can be used locally with Flyway CLI

# Database connection - uses environment variables
# flyway.url will be set from environment variable DATABASE_URL or PG* variables
# flyway.user will be set from PGUSER or default to postgres
# flyway.password will be set from PGPASSWORD

# Locations of migration scripts
flyway.locations=filesystem:flyway/sql

# Schema version table (Flyway default is 'flyway_schema_history', but we use 'schema_version')
flyway.table=schema_version

# Baseline version (for existing databases)
# flyway.baselineVersion=1
# flyway.baselineOnMigrate=true

# Placeholders - these are replaced in SQL files
# {AUTOINCREMENT} will be replaced based on database type
# Note: Flyway 10+ uses ${placeholder} syntax. For legacy {AUTOINCREMENT} support,
# we configure the placeholder prefix/suffix and define the value for PostgreSQL.
flyway.placeholderPrefix={
flyway.placeholderSuffix=}
flyway.placeholders.AUTOINCREMENT=SERIAL PRIMARY KEY
flyway.placeholders.TEXT=TEXT

# Encoding
flyway.encoding=UTF-8

# Clean disabled (prevent accidental data loss)
flyway.cleanDisabled=true

# Validate on migrate - ensures migrations are valid
flyway.validateOnMigrate=true

# OutOfOrder - allow out-of-order migrations if needed (set false for strict ordering)
flyway.outOfOrder=false

# Group migrations - multiple migrations with same version will be executed in order based on description
# This allows V2__a.sql and V2__b.sql to both be part of version 2
flyway.group=false

# Target version (optional - set to migrate to specific version)
# flyway.target=

# Logging
flyway.loggers=console
flyway.placeholderReplacement=true
