<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
    <defs>
        <radialGradient id="bg" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
            <stop offset="0%" stop-color="#19002e" />
            <stop offset="100%" stop-color="#020105" />
        </radialGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="25" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <linearGradient id="gridLine" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00f3ff" stop-opacity="0.2" />
            <stop offset="50%" stop-color="#00f3ff" stop-opacity="1" />
            <stop offset="100%" stop-color="#00f3ff" stop-opacity="0.2" />
        </linearGradient>
    </defs>

    <rect width="1600" height="900" fill="url(#bg)" />

    <!-- Distant background decorative grid -->
    <g stroke="rgba(255,255,255,0.03)" stroke-width="2">
        <line x1="0" y1="100" x2="1600" y2="100"/>
        <line x1="0" y1="200" x2="1600" y2="200"/>
        <line x1="0" y1="300" x2="1600" y2="300"/>
        <line x1="0" y1="400" x2="1600" y2="400"/>
        <line x1="0" y1="500" x2="1600" y2="500"/>
        <line x1="0" y1="600" x2="1600" y2="600"/>
        <line x1="0" y1="700" x2="1600" y2="700"/>
        <line x1="0" y1="800" x2="1600" y2="800"/>
    </g>

    <g transform="translate(560, 210)">
        <!-- Grid Base -->
        <rect x="10" y="10" width="460" height="460" fill="rgba(0,0,0,0.4)" rx="40" />
        
        <!-- Glowing Grid Lines -->
        <line x1="160" y1="30" x2="160" y2="450" stroke="url(#gridLine)" stroke-width="8" stroke-linecap="round" filter="url(#glow)" />
        <line x1="320" y1="30" x2="320" y2="450" stroke="url(#gridLine)" stroke-width="8" stroke-linecap="round" filter="url(#glow)" />
        <line x1="30" y1="160" x2="450" y2="160" stroke="url(#gridLine)" stroke-width="8" stroke-linecap="round" filter="url(#glow)" />
        <line x1="30" y1="320" x2="450" y2="320" stroke="url(#gridLine)" stroke-width="8" stroke-linecap="round" filter="url(#glow)" />
        
        <!-- Center O -->
        <circle cx="240" cy="240" r="45" stroke="#ff00e5" stroke-width="14" fill="none" filter="url(#heavyGlow)" />
        <circle cx="240" cy="240" r="45" stroke="#fff" stroke-width="6" fill="none" />
        
        <!-- Top Left X -->
        <g stroke="#ff00e5" stroke-width="14" filter="url(#heavyGlow)" stroke-linecap="round">
            <line x1="60" y1="60" x2="120" y2="120" />
            <line x1="120" y1="60" x2="60" y2="120" />
        </g>
        <g stroke="#fff" stroke-width="6" stroke-linecap="round">
            <line x1="60" y1="60" x2="120" y2="120" />
            <line x1="120" y1="60" x2="60" y2="120" />
        </g>
        
        <!-- Bottom Right X -->
        <g stroke="#ff00e5" stroke-width="14" filter="url(#heavyGlow)" stroke-linecap="round" transform="translate(280, 280)">
            <line x1="40" y1="40" x2="100" y2="100" />
            <line x1="100" y1="40" x2="40" y2="100" />
        </g>
        <g stroke="#fff" stroke-width="6" stroke-linecap="round" transform="translate(280, 280)">
            <line x1="40" y1="40" x2="100" y2="100" />
            <line x1="100" y1="40" x2="40" y2="100" />
        </g>
    </g>
</svg>
